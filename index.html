<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michas Knock Knock Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --orange:#FF6B1A; --orange-dark:#E5570F;
  --green:#1FAF3D; --green-dark:#157A28; --green-darker:#0E521B;
  --coin:#FFB400; --coin-dark:#B07F00;
  --white:#FFFFFF; --cream:#FFF5E8;
  --text:#1F0E03; --text-light:#5C3818; --text-muted:#8A6A45;
  --radius:14px; --radius-sm:8px; --radius-lg:20px;
  --shadow-sm:0 2px 8px rgba(31,14,3,.10); --shadow:0 8px 24px rgba(31,14,3,.18); --shadow-lg:0 16px 40px rgba(31,14,3,.22);
  --shadow-green:0 8px 24px rgba(31,175,61,.30);
  --cream-bg:#FAF5ED; --cream-deep:#F0E6D2; --cream-line:#E5D6BB;
  --warm-dark:#2A1F12; --warm-mid:#5A3F22;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Bebas Neue','Anton','Impact',sans-serif;
  --font-serif:'DM Serif Display','Playfair Display',Georgia,serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { background:var(--orange); color:var(--text); font-family:var(--font); min-height:100vh; -webkit-font-smoothing:antialiased; }
img { max-width:100%; height:auto; }

.topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 36px; background:var(--white); border-bottom:4px solid var(--green); position:sticky; top:0; z-index:100; box-shadow:var(--shadow-sm); gap:16px; flex-wrap:wrap; }
.brand { display:flex; align-items:center; gap:14px; cursor:pointer; }
.brand-logo-mini { width:150px; flex-shrink:0; }
.brand-logo-mini img { display:block; width:100%; height:auto; }
.brand-text { display:flex; flex-direction:column; line-height:1.05; padding-left:12px; border-left:3px solid var(--green); }
.brand-text strong { font-family:var(--font-display); font-size:22px; letter-spacing:1.5px; color:var(--text); }
.brand-text span { color:var(--orange); font-size:11px; letter-spacing:1px; text-transform:uppercase; font-weight:700; }
.topnav { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.topnav button { background:none; border:none; color:var(--text); padding:10px 14px; border-radius:var(--radius-sm); font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; text-transform:uppercase; letter-spacing:.5px; }
.topnav button:hover { color:var(--green); }
.topnav button.active { background:var(--green); color:var(--white); box-shadow:var(--shadow-green); }

.coin-chip { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--coin) 0%,#FFA000 100%); color:#2A1B0E; padding:6px 14px 6px 6px; border-radius:999px; font-weight:800; font-size:14px; cursor:pointer; box-shadow:0 4px 12px rgba(255,180,0,.4); }

.container { max-width:1200px; margin:0 auto; padding:40px 36px; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; background:var(--green); color:var(--white); border:none; border-radius:var(--radius-sm); padding:15px 28px; font-size:14px; font-weight:800; font-family:inherit; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer; text-decoration:none; transition:transform .12s ease,background .15s ease,box-shadow .15s ease; box-shadow:var(--shadow-green); }
.btn:hover { background:var(--green-dark); transform:translateY(-2px); }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn.btn-block { width:100%; }
.btn.btn-orange { background:var(--orange); color:var(--white); }
.btn.btn-coin { background:linear-gradient(135deg,var(--coin) 0%,#FFA000 100%); color:#2A1B0E; }
.btn.btn-danger { background:#C81E1E; }
.btn.btn-sm { padding:8px 16px; font-size:12px; }

.form-row { margin-bottom:16px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:600px) { .form-grid { grid-template-columns:1fr; } }
label { display:block; font-weight:700; font-size:12px; color:var(--text); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
input,select,textarea { width:100%; background:var(--cream); color:var(--text); border:2px solid var(--cream); border-radius:var(--radius-sm); padding:12px 14px; font-size:15px; font-family:inherit; font-weight:500; }
input:focus,select:focus,textarea:focus { outline:none; border-color:var(--green); background:var(--white); }

.alert { padding:14px 18px; border-radius:var(--radius-sm); margin-bottom:18px; font-size:14px; display:none; font-weight:600; }
.alert.show { display:block; }
.alert.success { background:rgba(31,175,61,.15); color:var(--green-darker); border-left:4px solid var(--green); }
.alert.error { background:rgba(200,30,30,.10); color:#8A1F1F; border-left:4px solid #C81E1E; }
.alert.coin { background:rgba(255,180,0,.18); color:var(--coin-dark); border-left:4px solid var(--coin); }

.card { background:var(--white); border-radius:var(--radius); padding:28px; box-shadow:var(--shadow); border-top:6px solid var(--green); }
.card h2 { font-family:var(--font-display); font-size:28px; letter-spacing:1.5px; margin-bottom:14px; color:var(--text); }
.card h3 { font-family:var(--font-display); font-size:22px; letter-spacing:1.5px; margin-bottom:10px; color:var(--text); }
.card p { color:var(--text-light); line-height:1.6; font-size:15px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:22px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:22px; }
@media (max-width:800px) { .grid-2 { grid-template-columns:1fr; } }

.login-page { min-height:100vh; padding:40px 24px; display:flex; flex-direction:column; align-items:center; position:relative; }
.login-page::before { content:''; position:absolute; inset:0; background:radial-gradient(900px 500px at 80% 10%,rgba(31,175,61,.15),transparent 60%),radial-gradient(700px 500px at 0% 100%,rgba(255,180,0,.15),transparent 60%); pointer-events:none; }
.login-logo-block { display:block; width:700px; max-width:92%; margin:0 auto 24px; background:var(--white); border-radius:var(--radius); padding:30px 40px; box-shadow:var(--shadow-lg); position:relative; z-index:2; }
.login-logo-block img { display:block; width:100%; height:auto; }
.login-title { font-family:var(--font-display); font-size:clamp(34px,5vw,56px); letter-spacing:2px; color:var(--white); text-shadow:4px 4px 0 rgba(31,14,3,.4); text-align:center; margin-bottom:40px; position:relative; z-index:2; line-height:1.05; }
.login-title .green { color:var(--green); text-shadow:4px 4px 0 var(--white); }
.login-row { display:flex; gap:40px; align-items:center; justify-content:center; position:relative; z-index:2; max-width:100%; flex-wrap:wrap; width:100%; }
.login-card { background:var(--white); border-radius:var(--radius-lg); padding:36px 32px; box-shadow:var(--shadow-lg); border-top:8px solid var(--green); max-width:440px; width:100%; }
.login-card h2 { font-family:var(--font-display); font-size:30px; letter-spacing:2px; margin-bottom:6px; color:var(--text); text-align:center; }
.login-card .sub { text-align:center; color:var(--text-light); margin-bottom:22px; font-size:14px; }
.login-card .foot { text-align:center; margin-top:18px; color:var(--text-light); font-size:14px; }
.login-card .foot a, .link { color:var(--green-dark); font-weight:700; cursor:pointer; text-decoration:none; }
.login-maverick { width:280px; flex-shrink:0; animation:float-soft 3s ease-in-out infinite; }
.login-maverick img { width:100%!important; max-width:280px!important; height:auto!important; display:block; mix-blend-mode:multiply; background:transparent; }
@keyframes float-soft { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
@media (max-width:700px) { .login-maverick { width:160px; margin:0 auto; } .login-maverick img { max-width:160px!important; } }

.dashboard-greeting { background:var(--green); color:var(--white); padding:50px 36px 70px; text-align:center; position:relative; }
.dashboard-greeting h1 { font-family:var(--font-display); font-size:clamp(36px,5vw,56px); letter-spacing:2px; margin-bottom:8px; text-shadow:3px 3px 0 var(--green-darker); }
.dashboard-greeting h1 .accent { color:var(--coin); }
.dashboard-greeting p { color:rgba(255,255,255,.92); font-size:16px; }
.dashboard-greeting .maverick-corner { position:absolute; right:40px; bottom:-20px; width:140px; z-index:3; }
.dashboard-greeting .maverick-corner img { width:100%!important; max-width:140px!important; height:auto!important; mix-blend-mode:multiply; background:transparent; }
@media (max-width:600px) { .dashboard-greeting .maverick-corner { width:90px; right:14px; } .dashboard-greeting .maverick-corner img { max-width:90px!important; } }

.balance-card { background:linear-gradient(135deg,var(--coin) 0%,#FFA000 100%); color:#2A1B0E; border-radius:var(--radius-lg); padding:28px; max-width:800px; margin:-40px auto 0; position:relative; z-index:2; box-shadow:0 16px 48px rgba(31,14,3,.30); display:flex; align-items:center; gap:24px; flex-wrap:wrap; justify-content:center; }
.balance-card .balance-body { text-align:left; flex-grow:1; min-width:200px; }
.balance-card .balance-label { font-size:12px; text-transform:uppercase; letter-spacing:2px; font-weight:700; }
.balance-card .balance-num { font-family:var(--font-display); font-size:56px; line-height:1; letter-spacing:1px; }
.balance-card .balance-meta { font-size:13px; opacity:.8; margin-top:4px; }

.dashboard-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; max-width:1200px; margin:32px auto 0; padding:0 36px; }
@media (max-width:800px) { .dashboard-cards { grid-template-columns:1fr; } }
.dash-card { background:var(--white); border-radius:var(--radius); padding:28px; box-shadow:var(--shadow-lg); border-top:6px solid var(--orange); cursor:pointer; transition:transform .15s ease; }
.dash-card:hover { transform:translateY(-4px); }
.dash-card.green-b { border-top-color:var(--green); }
.dash-card.coin-b { border-top-color:var(--coin); }
.dash-card h3 { font-family:var(--font-display); font-size:24px; letter-spacing:1.5px; margin-bottom:8px; }
.dash-card p { color:var(--text-light); margin-bottom:16px; font-size:14px; }

.maverick-float { position:fixed; bottom:20px; right:20px; width:110px; z-index:50; pointer-events:none; filter:drop-shadow(0 6px 14px rgba(0,0,0,.35)); }
.maverick-float img { width:100%!important; max-width:110px!important; height:auto!important; display:block; mix-blend-mode:multiply; background:transparent; }
@media (max-width:600px) { .maverick-float { width:70px; } .maverick-float img { max-width:70px!important; } }

.section-hero { padding:50px 36px 30px; text-align:center; position:relative; }
.section-hero h1 { font-family:var(--font-display); font-size:clamp(40px,6vw,72px); letter-spacing:2px; line-height:1; color:var(--white); text-shadow:3px 3px 0 rgba(31,14,3,.35); margin-bottom:14px; }
.section-hero h1 .green { color:var(--green); text-shadow:3px 3px 0 var(--white); }
.section-hero h1 .coin-c { color:var(--coin); text-shadow:3px 3px 0 rgba(31,14,3,.4); }
.section-hero p.lead { font-size:16px; color:var(--white); max-width:700px; margin:0 auto; font-weight:500; }

.merch-card { background:var(--white); border-radius:var(--radius); padding:22px; display:flex; flex-direction:column; border-bottom:4px solid var(--green); box-shadow:var(--shadow); }
.merch-emoji { font-size:72px; text-align:center; padding:22px 0; background:linear-gradient(135deg,rgba(31,175,61,.10),rgba(255,180,0,.15)); border-radius:var(--radius-sm); margin-bottom:14px; }
.merch-card h3 { font-family:var(--font-display); font-size:21px; letter-spacing:1.5px; margin-bottom:6px; }
.merch-card .desc { color:var(--text-light); font-size:13px; flex-grow:1; margin-bottom:14px; }
.merch-card .price-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px; }
.merch-card .price { font-family:var(--font-display); font-size:26px; color:var(--coin-dark); letter-spacing:1px; display:inline-flex; align-items:center; gap:6px; }
.merch-card .stock { font-size:11px; color:var(--text-muted); font-weight:700; text-transform:uppercase; }
.merch-card .category-tag { display:inline-block; background:rgba(31,175,61,.15); color:var(--green-darker); font-size:10px; padding:3px 9px; border-radius:999px; font-weight:700; text-transform:uppercase; margin-bottom:10px; }

.bikera-mega { background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%); color:var(--white); border-radius:var(--radius-lg); padding:36px; box-shadow:var(--shadow-lg); cursor:pointer; }
.bikera-mega .label { display:inline-block; background:var(--coin); color:#2A1B0E; padding:5px 12px; border-radius:999px; font-size:11px; font-weight:900; text-transform:uppercase; margin-bottom:14px; }
.bikera-mega h2 { font-family:var(--font-display); font-size:38px; letter-spacing:2px; margin-bottom:8px; color:var(--white); }
.bikera-mega p { color:rgba(255,255,255,.92); margin-bottom:18px; font-size:15px; }
.bike-card { background:var(--white); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); display:flex; flex-direction:column; border-left:5px solid var(--green); }
.bike-card .brand-tag { display:inline-block; padding:3px 9px; border-radius:999px; font-size:10px; font-weight:700; text-transform:uppercase; margin-bottom:8px; }
.bike-card .brand-tag.bikera { background:rgba(255,107,26,.18); color:var(--orange-dark); }
.bike-card .brand-tag.johansson { background:rgba(31,175,61,.18); color:var(--green-darker); }
.bike-card h4 { font-family:var(--font-display); font-size:20px; margin-bottom:6px; }
.bike-card .variant { color:var(--text-light); font-size:13px; margin-bottom:4px; }
.bike-card .motor { color:var(--text-muted); font-size:12px; margin-bottom:12px; }
.bike-card .price-block { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.bike-card .uvp { color:var(--text-muted); font-size:13px; text-decoration:line-through; }
.bike-card .ff { font-family:var(--font-display); font-size:28px; color:var(--green-dark); }
.bike-card .save { background:var(--coin); color:#2A1B0E; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:900; }

.pill { display:inline-block; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase; }
.pill.pending { background:rgba(255,204,0,.35); color:#6B5200; }
.pill.approved { background:rgba(31,175,61,.18); color:var(--green-darker); }
.pill.rejected { background:rgba(200,30,30,.15); color:#8A1F1F; }
.pill.admin { background:rgba(255,107,26,.20); color:var(--orange-dark); }
.table { width:100%; border-collapse:collapse; background:var(--white); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.table th, .table td { padding:12px 14px; text-align:left; border-bottom:1px solid #f0e0c8; font-size:13px; color:var(--text); }
.table th { background:var(--green); color:var(--white); font-size:11px; text-transform:uppercase; font-weight:700; }
.table tr:last-child td { border-bottom:none; }
.actions { display:flex; gap:6px; flex-wrap:wrap; }
.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; justify-content:center; }
.filter-bar button { background:var(--white); color:var(--text); border:2px solid var(--white); padding:8px 16px; border-radius:999px; font-size:12px; font-weight:700; cursor:pointer; }
.filter-bar button.active { background:var(--green); color:var(--white); border-color:var(--green); }

.spinner { display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.center-loader { text-align:center; padding:60px 24px; color:var(--white); }
.footer { background:var(--green-darker); color:rgba(255,255,255,.85); padding:50px 36px 30px; margin-top:60px; }
.footer-stripe { height:8px; background:linear-gradient(90deg,#F0BE2A 0%,#F0BE2A 33%,#D87E25 33%,#D87E25 66%,#9C2C1F 66%,#9C2C1F 100%); margin:-50px -36px 50px; }
.footer-grid { display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:32px; max-width:1200px; margin:0 auto; }
@media (max-width:800px) { .footer-grid { grid-template-columns:1fr; } }
.footer-col h5 { color:var(--white); font-size:13px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:14px; font-weight:700; }
.footer-col a { color:rgba(255,255,255,.75); font-size:13px; line-height:1.7; text-decoration:none; display:block; cursor:pointer; }
.footer-col a:hover { color:var(--coin); }
.footer-col p { color:rgba(255,255,255,.75); font-size:13px; line-height:1.7; }
.footer-bottom { border-top:1px solid rgba(255,255,255,.15); margin-top:40px; padding-top:20px; text-align:center; font-size:12px; color:rgba(255,255,255,.6); max-width:1200px; margin:40px auto 0; }

.text-center { text-align:center; }
.mt-2 { margin-top:16px; } .mt-4 { margin-top:32px; }
.mb-2 { margin-bottom:16px; } .mb-4 { margin-bottom:32px; }
.flex-gap { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
.faq-item { background:var(--white); border-radius:var(--radius-sm); padding:22px 26px; margin-bottom:14px; box-shadow:var(--shadow-sm); border-left:5px solid var(--green); }
.faq-item h4 { font-size:17px; color:var(--text); margin-bottom:10px; font-weight:700; }
.faq-item p { color:var(--text-light); font-size:15px; line-height:1.6; }

/* ============================================================
   PREMIUM LANDING PAGE
   ============================================================ */
.land-page { background:var(--cream-bg); min-height:100vh; color:var(--warm-dark); }
.land-page::before { content:''; display:block; height:1px; background:transparent; }

/* sticky-transparent topbar variant */
.land-nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:18px 40px; transition:background .35s ease, box-shadow .35s ease, padding .25s ease; }
.land-nav.scrolled { background:rgba(250,245,237,.92); backdrop-filter:blur(12px); box-shadow:0 1px 0 var(--cream-line); padding:12px 40px; }
.land-nav .land-logo { width:140px; cursor:pointer; transition:width .25s ease; }
.land-nav.scrolled .land-logo { width:110px; }
.land-nav .land-logo img, .land-nav .land-logo svg { display:block; width:100%; height:auto; }
.land-nav.over-dark .land-logo { background:rgba(255,255,255,.94); padding:8px 14px; border-radius:6px; }
.land-nav.scrolled.over-dark .land-logo { background:transparent; padding:0; }
.land-nav-links { display:flex; gap:32px; align-items:center; }
.land-nav-links a { color:var(--warm-dark); font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; text-decoration:none; cursor:pointer; transition:opacity .2s ease; }
.land-nav-links a:hover { opacity:.6; }
.land-nav.over-dark .land-nav-links a { color:#fff; }
.land-nav .land-cta { background:var(--orange); color:#fff; padding:11px 22px; border-radius:999px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer; border:none; font-family:inherit; transition:transform .15s ease, background .15s ease; }
.land-nav .land-cta:hover { background:var(--orange-dark); transform:translateY(-1px); }
@media (max-width:700px) {
  .land-nav { padding:12px 18px; }
  .land-nav-links { display:none; }
}

/* HERO */
.land-hero { position:relative; height:100vh; min-height:600px; width:100%; overflow:hidden; display:flex; align-items:flex-end; padding:0 0 110px; }
.land-hero-bg { position:absolute; inset:0; z-index:1; }
.land-hero-bg video, .land-hero-bg img { width:100%; height:100%; object-fit:cover; }
.land-hero-bg-fallback { position:absolute; inset:0; background:linear-gradient(135deg,#1a0f08 0%,#3a2316 45%,var(--orange-dark) 100%); }
.land-hero-bg::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.30) 0%, rgba(0,0,0,.10) 35%, rgba(0,0,0,.55) 100%); z-index:2; }
.land-hero-content { position:relative; z-index:3; max-width:1200px; margin:0 auto; padding:0 40px; width:100%; color:#fff; }
.land-hero h1 { font-family:var(--font-serif); font-weight:400; font-size:clamp(46px,7vw,108px); line-height:1.02; letter-spacing:-1px; margin-bottom:22px; text-shadow:0 4px 28px rgba(0,0,0,.45); }
.land-hero h1 em { font-style:italic; color:var(--coin); }
.land-hero p.lead { font-family:var(--font); font-size:clamp(15px,1.4vw,19px); max-width:560px; line-height:1.55; font-weight:400; opacity:.95; margin-bottom:36px; text-shadow:0 2px 12px rgba(0,0,0,.4); }
.land-hero-cta-row { display:flex; gap:14px; flex-wrap:wrap; }
.land-hero .btn-hero { display:inline-flex; align-items:center; gap:10px; padding:18px 32px; border-radius:999px; font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:2px; cursor:pointer; border:none; font-family:inherit; transition:transform .15s ease, background .15s ease; text-decoration:none; }
.land-hero .btn-hero-primary { background:#fff; color:var(--warm-dark); }
.land-hero .btn-hero-primary:hover { background:var(--coin); transform:translateY(-2px); }

async function route(page) {
  window.scrollTo(0, 0);
  await loadMe();
  const memberOnly = ['members','shop','codes','coins','bikera'];
  const adminOnly = ['admin'];
  if (memberOnly.includes(page)) {
    if (!me) page = 'home';
    else if (me.status !== 'approved' && me.role !== 'admin') page = 'pending';
  }
  if (adminOnly.includes(page) && (!me || me.role !== 'admin')) page = !me ? 'home' : 'pending';

  const showTopbar = me && (me.status === 'approved' || me.role === 'admin');
  if (showTopbar) { renderTopbar(page); renderFooter(); }
  else { document.getElementById('topbarSlot').innerHTML=''; document.getElementById('footerSlot').innerHTML=''; }
  // in-app premium styling: für alle eingeloggten + interne Seiten, nicht für Login/Register/Landing
  const inAppPages = ['members','coins','shop','codes','bikera','admin','pending','confirmed','impressum','datenschutz','faq'];
  if (inAppPages.includes(page) && (me || page==='impressum' || page==='datenschutz' || page==='faq')) document.body.classList.add('in-app');
  else document.body.classList.remove('in-app');

  const views = { home:viewHome, register:viewRegister, pending:viewPending, confirmed:viewConfirmed, members:viewMembers, coins:viewCoins, shop:viewShop, codes:viewCodes, bikera:viewBikera, admin:viewAdmin, impressum:viewImpressum, datenschutz:viewDatenschutz, faq:viewFaq };
  document.getElementById('app').innerHTML = '<div class="center-loader"><div class="spinner"></div></div>';
  const html = await (views[page] || viewHome)();
  document.getElementById('app').innerHTML = html;
  if (window.__afterRender) { try { window.__afterRender(); } catch(e) { console.error(e); } window.__afterRender = null; }
}

  const pendingR = reqs.filter(r => r.status === 'pending').length;
  const totalCoins = members.reduce((s,m) => s + (m.coins||0), 0);

  const memberOptions = members.filter(m=>m.role!=='admin').map(m => `<option value="${m.id}">${m.first_name} ${m.last_name} – ${m.email} (${fmtNum(m.coins||0)} MC)</option>`).join('');

      const { data, error } = await supa.rpc('review_coin_request', { p_request_id: reqId, p_action: action, p_coins: coins, p_admin_note: note });
      if (error) { a.className='alert error show'; a.textContent='Fehler: '+error.message; btn.disabled=false; return; }
      if (data && data.error) { a.className='alert error show'; a.textContent=data.error; btn.disabled=false; return; }
      a.className='alert success show'; a.textContent = action === 'approve' ? `✅ ${coins} MC freigegeben` : '⛔ Abgelehnt';
      setTimeout(() => route('admin'), 800);
    });

    const coinForm = document.getElementById('coinGrantForm');
    if (coinForm) {
      coinForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const a = document.getElementById('alert');
        const memberId = document.getElementById('grantMember').value;
        const amount = parseInt(document.getElementById('grantAmount').value);
        const desc = document.getElementById('grantDesc').value.trim();
        if (!memberId) { a.className='alert error show'; a.textContent='Mitglied wählen.'; return; }
        if (!amount || amount === 0) { a.className='alert error show'; a.textContent='Anzahl ≠ 0.'; return; }
        if (isDemoMode()) { a.className='alert success show'; a.textContent=`(Demo) ${amount > 0 ? '+' : ''}${fmtNum(amount)} MC gebucht.`; coinForm.reset(); return; }
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Buche…';
        const { data, error } = await supa.rpc('admin_grant_coins', { p_member_id: memberId, p_amount: amount, p_description: desc || 'Bonus' });
        btn.disabled = false; btn.textContent = '🪙 Coins buchen';
        if (error) { a.className='alert error show'; a.textContent='Fehler: '+error.message; return; }
        if (data && data.error) { a.className='alert error show'; a.textContent=data.error; return; }
        a.className='alert success show'; a.textContent=`✅ ${amount > 0 ? '+' : ''}${fmtNum(amount)} MC gebucht`;
        coinForm.reset();
        setTimeout(() => route('admin'), 1000);
      });
    }

    const annForm = document.getElementById('announcementForm');
    if (annForm) {
      annForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const a = document.getElementById('alert');
        const title = document.getElementById('annTitle').value.trim();
        const desc = document.getElementById('annDesc').value.trim();
        const reward = document.getElementById('annReward').value.trim() || null;
        const deadline = document.getElementById('annDeadline').value || null;
        if (!title || !desc) { a.className='alert error show'; a.textContent='Titel und Beschreibung sind Pflicht.'; return; }
        if (isDemoMode()) { a.className='alert success show'; a.textContent='(Demo) Challenge veröffentlicht.'; annForm.reset(); return; }
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Sende…';
        const { error } = await supa.from('announcements').insert({ title, description: desc, reward, deadline, is_active: true });
        btn.disabled = false; btn.textContent = 'Veröffentlichen';
        if (error) { a.className='alert error show'; a.textContent='Fehler: '+error.message; return; }
        a.className='alert success show'; a.textContent='✅ Challenge veröffentlicht.';
        annForm.reset(); setTimeout(() => route('admin'), 900);
      });
    }
    document.getElementById('annList')?.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-ann]');
      if (!btn) return;
      const id = parseInt(btn.dataset.ann);
      const action = btn.dataset.annAction;
      if (action === 'delete' && !confirm('Wirklich löschen?')) return;
      if (isDemoMode()) { const a = document.getElementById('alert'); a.className='alert success show'; a.textContent='(Demo) '+action+' OK.'; return; }

      if (action === 'delete') {

        await supa.from('announcements').update(updates).eq('id', id);
      }
      setTimeout(() => route('admin'), 400);
    });
  };
