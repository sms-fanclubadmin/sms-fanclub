<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michas Knock Knock Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --orange:        #FF6B1A;
  --orange-dark:   #E5570F;
  --green:         #1FAF3D;
  --green-dark:   #157A28;
  --green-darker: #0E521B;
  --coin:         #FFB400;
  --coin-dark:    #B07F00;
  --logo-yellow:  #F0BE2A;
  --logo-orange:  #D87E25;
  --logo-red:     #9C2C1F;
  --white:        #FFFFFF;
  --cream:        #FFF5E8;
  --text:         #1F0E03;
  --text-light:   #5C3818;
  --text-muted:   #8A6A45;
  --radius:       14px;
  --radius-sm:    8px;
  --radius-lg:    20px;
  --shadow-sm:    0 2px 8px rgba(31,14,3,.10);
  --shadow:       0 8px 24px rgba(31,14,3,.18);
  --shadow-lg:    0 16px 40px rgba(31,14,3,.22);
  --shadow-green: 0 8px 24px rgba(31,175,61,.30);
  --font:         'Inter', system-ui, -apple-system, sans-serif;
  --font-display: 'Bebas Neue', 'Anton', 'Impact', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--orange); color: var(--text); font-family: var(--font); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* Topbar */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 36px; background: var(--white); border-bottom: 4px solid var(--green); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); gap: 16px; flex-wrap: wrap; }
.brand { display: flex; align-items: center; gap: 14px; cursor: pointer; }
.brand-logo-mini { width: 150px; }
.brand-logo-mini img { display: block; width: 100%; height: auto; }
.brand-text { display: flex; flex-direction: column; line-height: 1.05; padding-left: 12px; border-left: 3px solid var(--green); }
.brand-text strong { font-family: var(--font-display); font-size: 22px; letter-spacing: 1.5px; color: var(--text); }
.brand-text span { color: var(--orange); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }

.topnav { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.topnav button { background: none; border: none; color: var(--text); padding: 10px 14px; border-radius: var(--radius-sm); font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; transition: all .15s ease; text-transform: uppercase; letter-spacing: .5px; }
.topnav button:hover { color: var(--green); }
.topnav button.active { background: var(--green); color: var(--white); box-shadow: var(--shadow-green); }

.coin-chip { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--coin) 0%, #FFA000 100%); color: #2A1B0E; padding: 8px 14px; border-radius: 999px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,180,0,.4); transition: transform .12s; }
.coin-chip:hover { transform: scale(1.05); }
.coin-chip img { width: 24px; height: 24px; }

.demo-banner { background: var(--coin); color: #2A1B0E; text-align: center; padding: 6px 16px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; }

/* Container & Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 40px 36px; }
.container-narrow { max-width: 520px; margin: 0 auto; padding: 32px 24px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: var(--green); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 15px 28px; font-size: 14px; font-weight: 800; font-family: inherit; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; text-decoration: none; transition: transform .12s ease, background .15s ease, box-shadow .15s ease; box-shadow: var(--shadow-green); }
.btn:hover { background: var(--green-dark); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(31,175,61,.4); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn.btn-block { width: 100%; }
.btn.btn-white { background: var(--white); color: var(--green-dark); box-shadow: var(--shadow); }
.btn.btn-white:hover { background: var(--cream); }
.btn.btn-outline { background: transparent; color: var(--white); border: 2px solid var(--white); box-shadow: none; }
.btn.btn-outline:hover { background: var(--white); color: var(--green-dark); }
.btn.btn-orange { background: var(--orange); color: var(--white); box-shadow: 0 8px 24px rgba(255,107,26,.4); }
.btn.btn-orange:hover { background: var(--orange-dark); }
.btn.btn-coin { background: linear-gradient(135deg, var(--coin) 0%, #FFA000 100%); color: #2A1B0E; box-shadow: 0 8px 24px rgba(255,180,0,.4); }
.btn.btn-coin:hover { background: linear-gradient(135deg, #FFA000 0%, var(--coin-dark) 100%); color: #fff; }
.btn.btn-danger { background: #C81E1E; box-shadow: 0 8px 24px rgba(200,30,30,.3); }
.btn.btn-danger:hover { background: #A01010; }
.btn.btn-sm { padding: 8px 16px; font-size: 12px; }

/* Forms */
.form-row { margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
label { display: block; font-weight: 700; font-size: 12px; color: var(--text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
input, select, textarea { width: 100%; background: var(--cream); color: var(--text); border: 2px solid var(--cream); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; font-family: inherit; font-weight: 500; transition: all .15s ease; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); background: var(--white); box-shadow: 0 0 0 4px rgba(31,175,61,.18); }
input::placeholder { color: #B89A6E; }

/* Alerts */
.alert { padding: 14px 18px; border-radius: var(--radius-sm); margin-bottom: 18px; font-size: 14px; display: none; font-weight: 600; }
.alert.show { display: block; }
.alert.success { background: rgba(31,175,61,.15); color: var(--green-darker); border-left: 4px solid var(--green); }
.alert.error { background: rgba(200,30,30,.10); color: #8A1F1F; border-left: 4px solid #C81E1E; }
.alert.info { background: rgba(255,107,26,.12); color: var(--orange-dark); border-left: 4px solid var(--orange); }
.alert.coin { background: rgba(255,180,0,.18); color: var(--coin-dark); border-left: 4px solid var(--coin); }

/* Cards */
.card { background: var(--white); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); border-top: 6px solid var(--green); transition: transform .15s ease, box-shadow .15s ease; }
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card h2 { font-family: var(--font-display); font-size: 28px; letter-spacing: 1.5px; margin-bottom: 14px; color: var(--text); }
.card h3 { font-family: var(--font-display); font-size: 22px; letter-spacing: 1.5px; margin-bottom: 10px; color: var(--text); }
.card p { color: var(--text-light); line-height: 1.6; font-size: 15px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
@media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

/* ============ LOGIN-STARTSEITE ============ */
.login-page {
  min-height: 100vh;
  padding: 40px 24px;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
}
.login-page::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(900px 500px at 80% 10%, rgba(31,175,61,.15), transparent 60%),
    radial-gradient(700px 500px at 0% 100%, rgba(255,180,0,.15), transparent 60%);
  pointer-events: none;
}
/* 1. SMS-Logo oben */
.login-logo-block {
  display: block;
  width: 700px;
  max-width: 92%;
  margin: 0 auto 24px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 30px 40px;
  box-shadow: var(--shadow-lg);
  position: relative; z-index: 2;
}
.login-logo-block img { display: block; width: 100%; height: auto; }
/* 2. Titel darunter */
.login-title {
  font-family: var(--font-display);
  font-size: clamp(34px, 5vw, 56px);
  letter-spacing: 2px;
  color: var(--white);
  text-shadow: 4px 4px 0 rgba(31,14,3,.4);
  text-align: center;
  margin-bottom: 40px;
  position: relative; z-index: 2;
  line-height: 1.05;
}
.login-title .green { color: var(--green); text-shadow: 4px 4px 0 var(--white); }

/* 3. Login + Maverick nebeneinander */
.login-row {
  display: flex; gap: 40px; align-items: center; justify-content: center;
  position: relative; z-index: 2;
  max-width: 100%; flex-wrap: wrap;
  width: 100%;
}
.login-maverick {
  width: 280px; flex-shrink: 0;
  animation: float-soft 3s ease-in-out infinite;
}
.login-maverick img { width: 100%; height: auto; display: block; }
@keyframes float-soft {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
@media (max-width: 700px) { .login-maverick { width: 160px; margin: 0 auto; } }

.login-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  box-shadow: var(--shadow-lg);
  border-top: 8px solid var(--green);
  max-width: 440px;
  width: 100%;
}
.login-card h2 { font-family: var(--font-display); font-size: 30px; letter-spacing: 2px; margin-bottom: 6px; color: var(--text); text-align: center; }
.login-card .sub { text-align: center; color: var(--text-light); margin-bottom: 22px; font-size: 14px; }
.login-card .foot { text-align: center; margin-top: 18px; color: var(--text-light); font-size: 14px; }
.login-card .foot a, .link { color: var(--green-dark); font-weight: 700; cursor: pointer; text-decoration: none; }
.login-card .foot a:hover, .link:hover { text-decoration: underline; }

.demo-hint {
  background: rgba(255,180,0,.18);
  border-left: 4px solid var(--coin);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 12px;
  color: var(--coin-dark);
  margin-bottom: 14px;
  text-align: left;
  line-height: 1.5;
}
.demo-hint strong { color: #2A1B0E; }
.demo-hint code { background: #2A1B0E; color: var(--coin); padding: 1px 6px; border-radius: 4px; font-size: 11px; }

/* ============ DASHBOARD ============ */
.dashboard-greeting {
  background: var(--green);
  color: var(--white);
  padding: 50px 36px 70px;
  text-align: center;
  position: relative;
}
.dashboard-greeting h1 { font-family: var(--font-display); font-size: clamp(36px, 5vw, 56px); letter-spacing: 2px; margin-bottom: 8px; text-shadow: 3px 3px 0 var(--green-darker); }
.dashboard-greeting h1 .accent { color: var(--coin); }
.dashboard-greeting p { color: rgba(255,255,255,.92); font-size: 16px; }
.dashboard-greeting .maverick-corner { position: absolute; right: 40px; bottom: -20px; width: 140px; z-index: 3; }
@media (max-width: 600px) { .dashboard-greeting .maverick-corner { width: 90px; right: 14px; } }
.dashboard-greeting .maverick-corner img { width: 100%; }

.balance-card {
  background: linear-gradient(135deg, var(--coin) 0%, #FFA000 100%);
  color: #2A1B0E;
  border-radius: var(--radius-lg);
  padding: 28px;
  max-width: 800px;
  margin: -40px auto 0;
  position: relative;
  z-index: 2;
  box-shadow: 0 16px 48px rgba(31,14,3,.30);
  display: flex; align-items: center; gap: 24px;
  flex-wrap: wrap; justify-content: center;
}
.balance-card .coin-img { width: 100px; flex-shrink: 0; }
.balance-card .coin-img img { width: 100%; }
.balance-card .balance-body { text-align: left; flex-grow: 1; min-width: 200px; }
.balance-card .balance-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
.balance-card .balance-num { font-family: var(--font-display); font-size: 56px; line-height: 1; letter-spacing: 1px; }
.balance-card .balance-meta { font-size: 13px; opacity: .8; margin-top: 4px; }

.dashboard-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; max-width: 1200px; margin: 32px auto 0; padding: 0 36px; }
@media (max-width: 800px) { .dashboard-cards { grid-template-columns: 1fr; } }
.dash-card { background: var(--white); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-lg); border-top: 6px solid var(--orange); cursor: pointer; transition: transform .15s ease; }
.dash-card:hover { transform: translateY(-4px); }
.dash-card.green-b { border-top-color: var(--green); }
.dash-card.coin-b { border-top-color: var(--coin); }
.dash-card h3 { font-family: var(--font-display); font-size: 24px; letter-spacing: 1.5px; margin-bottom: 8px; }
.dash-card p { color: var(--text-light); margin-bottom: 16px; font-size: 14px; }

/* Maverick überall (Float) */
.maverick-float {
  position: fixed; bottom: 20px; right: 20px;
  width: 110px; z-index: 50;
  pointer-events: none;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
.maverick-float img { width: 100%; height: auto; display: block; }
@media (max-width: 600px) { .maverick-float { width: 80px; } }

/* Hero (innerhalb des Mitgliederbereichs) */
.section-hero { padding: 50px 36px 30px; text-align: center; position: relative; }
.section-hero h1 { font-family: var(--font-display); font-size: clamp(40px, 6vw, 72px); letter-spacing: 2px; line-height: 1; color: var(--white); text-shadow: 3px 3px 0 rgba(31,14,3,.35); margin-bottom: 14px; }
.section-hero h1 .green { color: var(--green); text-shadow: 3px 3px 0 var(--white); }
.section-hero h1 .coin-c { color: var(--coin); text-shadow: 3px 3px 0 rgba(31,14,3,.4); }
.section-hero p.lead { font-size: 16px; color: var(--white); max-width: 700px; margin: 0 auto; font-weight: 500; }

/* Merch */
.merch-card { background: var(--white); border-radius: var(--radius); padding: 22px; display: flex; flex-direction: column; border-bottom: 4px solid var(--green); box-shadow: var(--shadow); transition: transform .15s ease, box-shadow .15s ease; }
.merch-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-bottom-color: var(--coin); }
.merch-emoji { font-size: 72px; text-align: center; padding: 22px 0; background: linear-gradient(135deg, rgba(31,175,61,.10), rgba(255,180,0,.15)); border-radius: var(--radius-sm); margin-bottom: 14px; }
.merch-card h3 { font-family: var(--font-display); font-size: 21px; letter-spacing: 1.5px; margin-bottom: 6px; }
.merch-card .desc { color: var(--text-light); font-size: 13px; flex-grow: 1; margin-bottom: 14px; line-height: 1.5; }
.merch-card .price-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
.merch-card .price { font-family: var(--font-display); font-size: 26px; color: var(--coin-dark); letter-spacing: 1px; display: inline-flex; align-items: center; gap: 4px; }
.merch-card .price img { width: 22px; height: 22px; }
.merch-card .stock { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.merch-card .category-tag { display: inline-block; background: rgba(31,175,61,.15); color: var(--green-darker); font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

/* Bikera */
.bikera-mega { background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%); color: var(--white); border-radius: var(--radius-lg); padding: 36px; box-shadow: var(--shadow-lg); cursor: pointer; transition: transform .15s; position: relative; overflow: hidden; }
.bikera-mega:hover { transform: translateY(-4px); }
.bikera-mega .label { display: inline-block; background: var(--coin); color: #2A1B0E; padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }
.bikera-mega h2 { font-family: var(--font-display); font-size: 38px; letter-spacing: 2px; margin-bottom: 8px; color: var(--white); }
.bikera-mega p { color: rgba(255,255,255,.92); margin-bottom: 18px; font-size: 15px; }
.bikera-mega::after { content: '🚴'; position: absolute; right: 30px; top: 50%; transform: translateY(-50%); font-size: 90px; opacity: .15; }

.bike-card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; border-left: 5px solid var(--green); transition: transform .15s; }
.bike-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.bike-card .brand-tag { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.bike-card .brand-tag.bikera { background: rgba(255,107,26,.18); color: var(--orange-dark); }
.bike-card .brand-tag.johansson { background: rgba(31,175,61,.18); color: var(--green-darker); }
.bike-card h4 { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; color: var(--text); margin-bottom: 6px; }
.bike-card .variant { color: var(--text-light); font-size: 13px; margin-bottom: 4px; }
.bike-card .motor { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
.bike-card .price-block { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.bike-card .uvp { color: var(--text-muted); font-size: 13px; text-decoration: line-through; }
.bike-card .ff { font-family: var(--font-display); font-size: 28px; color: var(--green-dark); letter-spacing: 1px; }
.bike-card .save { display: inline-block; background: var(--coin); color: #2A1B0E; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; }

/* Pills + Tables */
.pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.pill.pending { background: rgba(255,204,0,.35); color: #6B5200; border: 1px solid rgba(255,204,0,.7); }
.pill.approved { background: rgba(31,175,61,.18); color: var(--green-darker); border: 1px solid var(--green); }
.pill.rejected { background: rgba(200,30,30,.15); color: #8A1F1F; border: 1px solid rgba(200,30,30,.5); }
.pill.admin { background: rgba(255,107,26,.20); color: var(--orange-dark); border: 1px solid var(--orange); }

.table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.table th, .table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid #f0e0c8; font-size: 13px; color: var(--text); }
.table th { background: var(--green); color: var(--white); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--cream); }
.actions { display: flex; gap: 6px; flex-wrap: wrap; }

.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; justify-content: center; }
.filter-bar button { background: var(--white); color: var(--text); border: 2px solid var(--white); padding: 8px 16px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; box-shadow: var(--shadow-sm); text-transform: uppercase; letter-spacing: 1px; }
.filter-bar button.active { background: var(--green); color: var(--white); border-color: var(--green); }

.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.center-loader { text-align: center; padding: 60px 24px; color: var(--white); }

/* Footer */
.footer { background: var(--green-darker); color: rgba(255,255,255,.85); padding: 50px 36px 30px; margin-top: 60px; }
.footer-stripe { height: 8px; background: linear-gradient(90deg, var(--logo-yellow) 0%, var(--logo-yellow) 33%, var(--logo-orange) 33%, var(--logo-orange) 66%, var(--logo-red) 66%, var(--logo-red) 100%); margin: -50px -36px 50px; }
.footer-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 32px; max-width: 1200px; margin: 0 auto; }
@media (max-width: 800px) { .footer-grid { grid-template-columns: 1fr; } }
.footer-col h5 { color: var(--white); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px; font-weight: 700; }
.footer-col a { color: rgba(255,255,255,.75); font-size: 13px; line-height: 1.7; text-decoration: none; display: block; cursor: pointer; }
.footer-col a:hover { color: var(--coin); }
.footer-col p { color: rgba(255,255,255,.75); font-size: 13px; line-height: 1.7; }
.footer-bottom { border-top: 1px solid rgba(255,255,255,.15); margin-top: 40px; padding-top: 20px; text-align: center; font-size: 12px; color: rgba(255,255,255,.6); max-width: 1200px; margin-left: auto; margin-right: auto; }

.text-center { text-align: center; }
.mt-2 { margin-top: 16px; } .mt-4 { margin-top: 32px; }
.mb-2 { margin-bottom: 16px; } .mb-4 { margin-bottom: 32px; }
.flex-gap { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<div id="topbarSlot"></div>
<main id="app"></main>
<div id="footerSlot"></div>
<div class="maverick-float" id="maverick-float"></div>

async function loadMe() {
  // Demo-Login? Dann aus localStorage holen
  const demoEmail = localStorage.getItem(DEMO_KEY);
  if (demoEmail && DEMO_USERS[demoEmail]) {
    me = JSON.parse(JSON.stringify(DEMO_USERS[demoEmail].data)); // deep copy
    return me;
  }
  const { data: { user } } = await supa.auth.getUser();
  if (!user) { me = null; return null; }
  const { data: member, error } = await supa.from('members').select('*').eq('id', user.id).single();

  me = member;
  return me;
}

async function route(page) {
  window.scrollTo(0, 0);
  await loadMe();

  const publicPages = ['home', 'register', 'confirmed', 'impressum', 'datenschutz'];
  const memberOnly = ['members','shop','codes','coins','bikera'];
  const adminOnly = ['admin'];

  if (memberOnly.includes(page) && !publicPages.includes(page)) {
    if (!me) page = 'home';
    else if (me.status !== 'approved' && me.role !== 'admin') page = 'pending';
  }
  if (adminOnly.includes(page) && (!me || me.role !== 'admin')) {
    if (!me) page = 'home';
    else page = 'pending';
  }

  const showTopbar = me && (me.status === 'approved' || me.role === 'admin');
  if (showTopbar) {
    renderTopbar(page);
    renderMaverick();
    renderFooter();
  } else {
    document.getElementById('topbarSlot').innerHTML = '';
    document.getElementById('maverick-float').innerHTML = '';
    document.getElementById('footerSlot').innerHTML = '';
  }

  const views = {
    home: viewHome, register: viewRegister, pending: viewPending, confirmed: viewConfirmed,
    members: viewMembers, coins: viewCoins, shop: viewShop, codes: viewCodes, bikera: viewBikera,
    admin: viewAdmin, impressum: viewImpressum, datenschutz: viewDatenschutz
  };
  document.getElementById('app').innerHTML = '<div class="center-loader"><div class="spinner"></div></div>';
  const html = await (views[page] || viewHome)();
  document.getElementById('app').innerHTML = html;
  if (window.__afterRender) { try { window.__afterRender(); } catch(e) { console.error(e); } window.__afterRender = null; }
}

async function viewAdmin() {
  let members = [], txs = [], reqs = [], orders = [];
  if (isDemoMode()) {
    members = DEMO_MEMBERS_ADMIN_VIEW;
    txs = DEMO_TRANSACTIONS;
    reqs = DEMO_REQUESTS;
    orders = DEMO_ORDERS;
  } else {
    const [m, t, r, o] = await Promise.all([
      supa.from('members').select('*').order('created_at', { ascending: false }),
      supa.from('coin_transactions').select('id, amount, type, description, order_number, created_at, member:member_id(first_name, last_name, email)').order('created_at', { ascending: false }).limit(40),
      supa.from('coin_requests').select('id, order_number, member_note, status, coins_awarded, admin_note, created_at, member:member_id(first_name, last_name, email)').order('created_at', { ascending: false }).limit(40),
      supa.from('orders').select('id, quantity, coins_spent, created_at, merch:merch_id(name, emoji), member:member_id(first_name, last_name, email)').order('created_at', { ascending: false }).limit(30)
    ]);
    members = m.data || []; txs = t.data || []; reqs = r.data || []; orders = o.data || [];
  }
  const pendingM = members.filter(m => m.status === 'pending').length;
  const pendingR = reqs.filter(r => r.status === 'pending').length;
  const totalCoins = members.reduce((s,m) => s + (m.coins||0), 0);

  window.__afterRender = () => {
    document.getElementById('membersBody')?.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const a = document.getElementById('alert');
      if (isDemoMode()) { a.className='alert success show'; a.textContent=`(Demo) Mitglied ${action === 'approve' ? 'freigeschaltet' : 'abgelehnt'}.`; return; }
      btn.disabled = true;
      const member = members.find(m => m.id === id);
      const updates = action === 'approve' ? { status: 'approved', approved_at: new Date().toISOString() } : { status: 'rejected' };
      const { error } = await supa.from('members').update(updates).eq('id', id);
      if (error) { a.className='alert error show'; a.textContent='Fehler: '+error.message; btn.disabled=false; return; }
      if (action === 'approve' && member) {
        try {
          await fetch('/api/notify-approval', { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email: member.email, firstName: member.first_name }) });
        } catch (e) { console.warn('notify-approval:', e); }
      }
      a.className='alert success show';
      a.textContent = action === 'approve' ? '✅ Freigeschaltet' : '⛔ Abgelehnt';
      setTimeout(() => route('admin'), 1000);
    });

    document.getElementById('reqBody')?.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-req]');
      if (!btn) return;
      const reqId = parseInt(btn.dataset.req);
      const action = btn.dataset.action;
      let coins = 0, note = '';
      if (action === 'approve') {
        const coinsStr = prompt('Wie viele Maverick Coins?');
        if (!coinsStr) return;
        coins = parseInt(coinsStr);
        if (!coins || coins <= 0) { alert('Ungültige Anzahl'); return; }
        note = prompt('Optional: Notiz fürs Mitglied') || '';
      } else {
        note = prompt('Grund der Ablehnung (optional):') || '';
      }
      const a = document.getElementById('alert');
      if (isDemoMode()) { a.className='alert success show'; a.textContent=`(Demo) ${action === 'approve' ? coins + ' MC freigegeben' : 'Antrag abgelehnt'}.`; return; }
      btn.disabled = true;
      const { data, error } = await supa.rpc('review_coin_request', { p_request_id: reqId, p_action: action, p_coins: coins, p_admin_note: note });
      if (error) { a.className='alert error show'; a.textContent='Fehler: '+error.message; btn.disabled=false; return; }
      if (data && data.error) { a.className='alert error show'; a.textContent=data.error; btn.disabled=false; return; }
      a.className='alert success show';
      a.textContent = action === 'approve' ? `✅ ${coins} MC freigegeben` : '⛔ Abgelehnt';
      setTimeout(() => route('admin'), 800);
    });

    const coinForm = document.getElementById('coinGrantForm');
    if (coinForm) {
      coinForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const a = document.getElementById('alert');
        const memberId = document.getElementById('grantMember').value;
        const amount = parseInt(document.getElementById('grantAmount').value);
        const desc = document.getElementById('grantDesc').value.trim();
        if (!memberId) { a.className='alert error show'; a.textContent='Mitglied wählen.'; return; }
        if (!amount || amount === 0) { a.className='alert error show'; a.textContent='Anzahl ≠ 0.'; return; }
        if (isDemoMode()) { a.className='alert success show'; a.textContent=`(Demo) ${amount > 0 ? '+' : ''}${fmtNum(amount)} MC gebucht.`; coinForm.reset(); return; }
        const btn = e.target.querySelector('button[type=submit]');
        btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Wird gebucht…';
        const { data, error } = await supa.rpc('admin_grant_coins', { p_member_id: memberId, p_amount: amount, p_description: desc || 'Bonus' });
        btn.disabled = false; btn.textContent = '🪙 Coins buchen';
        if (error) { a.className='alert error show'; a.textContent='Fehler: '+error.message; return; }
        if (data && data.error) { a.className='alert error show'; a.textContent=data.error; return; }
        a.className='alert success show'; a.textContent=`✅ ${amount > 0 ? '+' : ''}${fmtNum(amount)} MC gebucht`;
        coinForm.reset();
        setTimeout(() => route('admin'), 1000);
      });
    }
  };

  const fmt = s => s ? new Date(s).toLocaleString('de-DE') : '–';

    `<option value="${m.id}">${m.first_name} ${m.last_name} – ${m.email} (${fmtNum(m.coins||0)} MC)</option>`
  ).join('');

  return `
  <section class="dashboard-greeting">
    <h1>ADMIN <span class="accent">PANEL</span></h1>
    <p>Mitglieder verifizieren, Coin-Anträge prüfen, Bestellungen einsehen.</p>
    <div class="maverick-corner"><img src="img/maverick.png" alt="Maverick" style="width:100%;height:auto;display:block" onerror="this.style.display='none'"></div>
  </section>
  <div class="container">
    <div id="alert" class="alert"></div>

    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;margin-bottom:32px;">
      <div class="card text-center" style="padding:20px;"><div style="font-family:var(--font-display);font-size:38px;color:var(--green-dark);">${members.length}</div><div style="text-transform:uppercase;font-weight:700;letter-spacing:1px;color:var(--text-light);font-size:11px;">Mitglieder</div></div>
      <div class="card text-center" style="padding:20px;"><div style="font-family:var(--font-display);font-size:38px;color:var(--orange);">${pendingM}</div><div style="text-transform:uppercase;font-weight:700;letter-spacing:1px;color:var(--text-light);font-size:11px;">Account-Anträge</div></div>
      <div class="card text-center" style="padding:20px;"><div style="font-family:var(--font-display);font-size:38px;color:var(--coin-dark);">${pendingR}</div><div style="text-transform:uppercase;font-weight:700;letter-spacing:1px;color:var(--text-light);font-size:11px;">Coin-Anträge</div></div>
      <div class="card text-center" style="padding:20px;"><div style="font-family:var(--font-display);font-size:38px;color:var(--green-dark);">${fmtNum(totalCoins)}</div><div style="text-transform:uppercase;font-weight:700;letter-spacing:1px;color:var(--text-light);font-size:11px;">MC im Umlauf</div></div>
    </div>

    <div class="card mb-4" style="background:linear-gradient(135deg, var(--coin) 0%, #FFA000 100%);color:#2A1B0E;border-top-color:#2A1B0E;">
      <h2 style="color:#2A1B0E;">📋 Coin-Anträge prüfen</h2>

      <div style="overflow-x:auto;margin-top:16px;background:var(--white);border-radius:8px;">
        <table class="table" style="background:transparent;box-shadow:none;">
          <thead><tr><th>Eingereicht</th><th>Mitglied</th><th>Auftrag #</th><th>Notiz</th><th>Status</th><th>Aktion</th></tr></thead>
          <tbody id="reqBody">
            ${reqs.length === 0 ? '<tr><td colspan="6" class="text-center" style="color:var(--text-light)">Keine Anträge</td></tr>' :
              reqs.map(r => `<tr>
                <td>${fmt(r.created_at)}</td>
                <td>${r.member?.first_name||'?'} ${r.member?.last_name||''}<br><span style="font-size:11px;color:var(--text-light)">${r.member?.email||''}</span></td>

                <td>${r.member_note || '–'}</td>
                <td><span class="pill ${r.status}">${r.status}</span>${r.status==='approved' ? `<br><span style="font-size:11px;color:var(--coin-dark);font-weight:700">+${r.coins_awarded} MC</span>` : ''}</td>
                <td class="actions">${r.status === 'pending' ? `
                  <button class="btn btn-sm" data-action="approve" data-req="${r.id}">Freigeben</button>
                  <button class="btn btn-sm btn-danger" data-action="reject" data-req="${r.id}">Ablehnen</button>
                ` : '–'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card mb-4">
      <h2>🪙 Bonus-Coins vergeben</h2>
      <p>Außerhalb der Auftrags-Belohnung kannst du Mitgliedern manuell Coins gutschreiben oder abziehen.</p>

        <div class="form-row">

        <tbody id="membersBody">
          ${members.map(m => `<tr>
            <td><strong>${m.first_name || ''} ${m.last_name || ''}</strong></td>

            `}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>

    ${txs.length > 0 ? `<div class="card mb-4">

    ${orders.length > 0 ? `<div class="card">

}

  });
  supa.auth.onAuthStateChange(async (event) => {
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED') {
      await loadMe();
    } else if (event === 'SIGNED_OUT') {
      if (!isDemoMode()) me = null;
    }
  });
  await loadMe();
  const initialHash = window.location.hash.replace('#','');
  if (initialHash) {
    route(initialHash);
  } else if (me && (me.status === 'approved' || me.role === 'admin')) {
    route(me.role === 'admin' ? 'admin' : 'members');
  } else if (me) {
    route('pending');
  } else {
    route('home');
  }
})();
</script>
