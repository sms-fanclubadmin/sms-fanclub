<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michas Knock Knock Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --orange:#FF6B1A; --orange-dark:#E5570F;
  --green:#1FAF3D; --green-dark:#157A28; --green-darker:#0E521B;
  --coin:#FFB400; --coin-dark:#B07F00;
  --white:#FFFFFF; --cream:#FFF5E8;
  --text:#1F0E03; --text-light:#5C3818; --text-muted:#8A6A45;
  --cream-bg:#FAF5ED; --cream-deep:#F0E6D2; --cream-line:#E5D6BB;
  --warm-dark:#2A1F12; --warm-mid:#5A3F22;
  --radius:14px; --radius-sm:8px; --radius-lg:20px;
  --shadow-sm:0 2px 8px rgba(31,14,3,.10);
  --shadow:0 8px 24px rgba(31,14,3,.18);
  --shadow-lg:0 16px 40px rgba(31,14,3,.22);
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Bebas Neue','Anton','Impact',sans-serif;
  --font-serif:'DM Serif Display','Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1a0f06;color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none;cursor:pointer}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============================================================
   LOGIN
   ============================================================ */
.prem-login{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;overflow:hidden}
.prem-login-bg{position:absolute;inset:0;background:radial-gradient(1200px 800px at 20% 10%,#6b3a14 0%,transparent 60%),radial-gradient(900px 700px at 85% 90%,#8a4517 0%,transparent 60%),linear-gradient(140deg,#1a0f06 0%,#3a200c 45%,#6b3a14 100%);z-index:0}
.prem-login-bg::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 400px at 60% 30%,rgba(255,107,26,.18),transparent 70%);pointer-events:none}
.prem-login-shell{position:relative;z-index:1;max-width:520px;width:100%;display:flex;flex-direction:column;align-items:center;gap:26px}
.prem-login-logo{width:340px;max-width:100%;background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 20px 60px rgba(0,0,0,.35);border:2px solid rgba(255,107,26,.35)}
.prem-login-brand{text-align:center;color:#fff;margin-bottom:4px}
.prem-login-eyebrow-top{font-size:11px;letter-spacing:4px;font-weight:700;color:var(--orange);text-transform:uppercase;margin-bottom:8px}
.prem-login-brand-title{font-family:var(--font-serif);font-weight:400;font-size:clamp(30px,4.2vw,44px);line-height:1.05;letter-spacing:-.5px}
.prem-login-brand-title em{font-style:italic;color:var(--orange)}
.prem-login-divider{display:flex;align-items:center;justify-content:center;gap:8px;margin:2px 0}
.prem-login-divider::before,.prem-login-divider::after{content:"";height:1px;flex:1;max-width:60px;background:rgba(255,255,255,.2)}
.prem-login-divider span{width:10px;height:10px;border-radius:50%;background:var(--orange);box-shadow:0 0 12px var(--orange)}
.prem-login-card{width:100%;background:#fff;border-radius:12px;border:1px solid rgba(255,107,26,.35);border-top:3px solid var(--orange);padding:40px 36px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.prem-login-eyebrow{font-size:11px;letter-spacing:3px;font-weight:700;color:var(--orange-dark);text-transform:uppercase;margin-bottom:10px;text-align:center}
.prem-login-title{font-family:var(--font-serif);font-weight:400;font-size:30px;color:var(--warm-dark);text-align:center;letter-spacing:-.5px;margin-bottom:6px}
.prem-login-sub{font-size:14px;color:var(--warm-mid);text-align:center;margin-bottom:26px}
.prem-form{display:flex;flex-direction:column;gap:18px}
.prem-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--warm-mid);margin-bottom:6px;display:block}
.prem-input{width:100%;padding:10px 2px;background:transparent;border:none;border-bottom:1.5px solid var(--cream-line);font-size:15px;color:var(--warm-dark);outline:none;transition:border-color .2s}
.prem-input:focus{border-bottom-color:var(--orange)}
.prem-input::placeholder{color:var(--text-muted)}
.prem-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:8px;font-weight:600;font-size:14px;letter-spacing:.3px;transition:transform .15s,box-shadow .15s,background .15s;text-align:center;line-height:1.2}
.prem-btn:hover{transform:translateY(-1px)}
.prem-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.prem-btn-primary{background:var(--warm-dark);color:#fff}
.prem-btn-primary:hover{background:#3a2b18}
.prem-btn-orange{background:var(--orange);color:#fff;box-shadow:0 8px 22px -8px rgba(255,107,26,.55)}
.prem-btn-orange:hover{background:var(--orange-dark);box-shadow:0 12px 30px -8px rgba(255,107,26,.65)}
.prem-btn-coin{background:var(--coin);color:#3a2600}
.prem-btn-coin:hover{background:#e5a300}
.prem-btn-ghost{background:transparent;color:var(--warm-dark);border:1px solid var(--cream-line)}
.prem-btn-ghost:hover{background:var(--cream-bg)}
.prem-btn-danger{background:#C81E1E;color:#fff}
.prem-btn-danger:hover{background:#a51818}
.prem-btn-sm{padding:8px 14px;font-size:12px}
.prem-btn-block{width:100%;justify-content:center}
.prem-login-foot{margin-top:22px;text-align:center;font-size:13px;color:var(--warm-mid)}
.prem-link-quiet{color:var(--orange-dark);cursor:pointer;font-weight:600}
.prem-link-quiet:hover{text-decoration:underline}
.prem-login-meta{margin-top:20px;text-align:center;font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.5px}
.prem-alert{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;line-height:1.4}
.prem-alert.show{display:block}
.prem-alert.error{background:rgba(200,30,30,.10);color:#8a1414;border:1px solid rgba(200,30,30,.30)}
.prem-alert.success{background:rgba(31,175,61,.12);color:var(--green-darker);border:1px solid rgba(31,175,61,.30)}
.prem-alert.coin{background:rgba(255,180,0,.15);color:#6b4c00;border:1px solid rgba(255,180,0,.35)}

/* ============================================================
   IN-APP CHROME (Topbar / Footer)
   ============================================================ */
body.in-app{background:var(--cream-bg);color:var(--text)}
.in-app .topbar{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:14px 40px;background:rgba(250,245,237,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--cream-line)}
.in-app .prem-brand{display:flex;align-items:center;gap:12px;cursor:pointer}
.in-app .prem-brand-logo{width:52px;height:52px;background:#fff;border-radius:10px;padding:6px;box-shadow:var(--shadow-sm);flex-shrink:0}
.in-app .prem-brand-logo img{width:100%;height:100%;object-fit:contain}
.in-app .prem-brand-text strong{display:block;font-family:var(--font-display);font-size:20px;color:var(--warm-dark);letter-spacing:1.5px;line-height:1}
.in-app .prem-brand-text span{display:block;font-size:11px;color:var(--warm-mid);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:2px}
.in-app .prem-nav-side{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.in-app .topnav{display:flex;gap:4px;flex-wrap:wrap}
.in-app .topnav button{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--warm-mid);background:transparent;transition:background .15s,color .15s}
.in-app .topnav button:hover{background:rgba(255,107,26,.10);color:var(--orange-dark)}
.in-app .topnav button.active{background:var(--warm-dark);color:#fff}
.in-app .coin-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid var(--cream-line);border-radius:999px;font-weight:700;color:var(--coin-dark);font-size:14px;cursor:pointer;box-shadow:var(--shadow-sm)}
.in-app .coin-chip:hover{border-color:var(--coin)}

/* ============================================================
   PREMIUM SECTIONS
   ============================================================ */
.prem-hero{padding:120px 40px 60px;max-width:1280px;margin:0 auto;position:relative}
.prem-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:3px;font-weight:700;color:var(--orange-dark);margin-bottom:16px}
.prem-hero h1{font-family:var(--font-serif);font-weight:400;font-size:clamp(42px,6vw,72px);line-height:1.02;color:var(--warm-dark);letter-spacing:-1px;margin-bottom:18px}
.prem-hero h1 em{font-style:italic;color:var(--orange-dark)}
.prem-hero-lead{font-size:17px;line-height:1.6;color:var(--warm-mid);max-width:640px}
.prem-section{padding:60px 40px;max-width:1280px;margin:0 auto}
.prem-section-head{margin-bottom:32px}
.prem-section-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:3px;font-weight:700;color:var(--orange-dark);margin-bottom:12px}
.prem-section-head h2{font-family:var(--font-serif);font-weight:400;font-size:clamp(28px,3.4vw,40px);line-height:1.1;color:var(--warm-dark);letter-spacing:-.5px}
.prem-section-head h2 em{font-style:italic;color:var(--orange-dark)}
.prem-card{background:#fff;border:1px solid var(--cream-line);border-radius:14px;padding:28px;box-shadow:0 8px 24px -14px rgba(42,31,18,.15)}
.prem-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.prem-grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
@media(max-width:900px){.prem-grid-2{grid-template-columns:1fr}.prem-hero{padding:80px 24px 40px}.prem-section{padding:40px 24px}.in-app .topbar{padding:12px 20px}}

/* Balance */
.prem-balance{display:flex;align-items:center;gap:22px;background:linear-gradient(135deg,#fff 0%,#fffaf0 100%);border:1px solid var(--cream-line);border-radius:16px;padding:24px 28px;box-shadow:0 10px 30px -18px rgba(42,31,18,.28);margin-bottom:40px}
.prem-balance-coin{width:76px;height:76px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffdd6b,var(--coin) 70%,var(--coin-dark));display:flex;align-items:center;justify-content:center;color:#3a2600;font-weight:900;font-family:var(--font-display);font-size:22px;letter-spacing:1px;flex-shrink:0;box-shadow:inset 0 -6px 12px rgba(0,0,0,.15)}
.prem-balance-body{flex:1}
.prem-balance-label{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;font-weight:700;color:var(--warm-mid);margin-bottom:4px}
.prem-balance-num{font-family:var(--font-serif);font-weight:400;font-size:44px;line-height:1;color:var(--warm-dark);letter-spacing:-.5px}
.prem-balance-meta{font-size:13px;color:var(--warm-mid);margin-top:6px}

/* Tiles */
.prem-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
@media(max-width:900px){.prem-tiles{grid-template-columns:1fr}}
.prem-tile{background:#fff;border:1px solid var(--cream-line);border-radius:14px;padding:28px 26px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.prem-tile:hover{transform:translateY(-4px);box-shadow:0 20px 40px -22px rgba(42,31,18,.30)}
.prem-tile-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;font-weight:700;color:var(--orange-dark);margin-bottom:10px}
.prem-tile h3{font-family:var(--font-serif);font-weight:400;font-size:28px;color:var(--warm-dark);letter-spacing:-.3px;line-height:1.1;margin-bottom:10px}
.prem-tile p{font-size:14px;color:var(--warm-mid);line-height:1.55;margin-bottom:22px}
.prem-tile-cta{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--orange-dark);text-transform:uppercase;letter-spacing:1.5px}
.prem-tile-cta::after{content:"→";transition:transform .18s}
.prem-tile:hover .prem-tile-cta::after{transform:translateX(4px)}

/* Form card */
.prem-form-card{background:#fff;border:1px solid var(--cream-line);border-radius:14px;padding:32px;box-shadow:0 8px 24px -14px rgba(42,31,18,.15)}
.prem-form-card h3{font-family:var(--font-serif);font-weight:400;font-size:24px;color:var(--warm-dark);margin-bottom:8px}
.prem-form-card p.hint{font-size:13px;color:var(--warm-mid);line-height:1.55;margin-bottom:20px}
.prem-form-card ol,.prem-form-card ul{padding-left:20px;color:var(--warm-mid);font-size:14px;line-height:1.9}
.prem-form-card ol li,.prem-form-card ul li{margin-bottom:4px}
.prem-form-card select,.prem-form-card textarea{width:100%;padding:10px 2px;background:transparent;border:none;border-bottom:1.5px solid var(--cream-line);font-size:15px;color:var(--warm-dark);outline:none;transition:border-color .2s;font-family:inherit}
.prem-form-card select:focus,.prem-form-card textarea:focus{border-bottom-color:var(--orange)}
.prem-form-card textarea{resize:vertical;min-height:90px;padding:12px}

/* Table */
.prem-table-wrap{overflow-x:auto;background:#fff;border:1px solid var(--cream-line);border-radius:14px;box-shadow:0 8px 24px -14px rgba(42,31,18,.15)}
.prem-table{width:100%;border-collapse:collapse;font-size:13px}
.prem-table th{text-align:left;padding:14px 18px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--warm-mid);border-bottom:1px solid var(--cream-line);background:#fbf7ee}
.prem-table td{padding:14px 18px;border-bottom:1px solid var(--cream-line);color:var(--warm-dark);vertical-align:middle}
.prem-table tr:last-child td{border-bottom:none}
.prem-table .actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* Pill */
.prem-pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase}
.prem-pill.pending{background:rgba(255,180,0,.20);color:#8a5f00}
.prem-pill.approved{background:rgba(31,175,61,.18);color:var(--green-darker)}
.prem-pill.rejected{background:rgba(200,30,30,.15);color:#8a1414}
.prem-pill.admin{background:var(--warm-dark);color:#fff}

/* Merch */
.prem-merch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}
.prem-merch{background:#fff;border:1px solid var(--cream-line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.prem-merch:hover{transform:translateY(-3px);box-shadow:0 18px 36px -20px rgba(42,31,18,.30)}
.prem-merch-img{aspect-ratio:4/5;background:linear-gradient(135deg,var(--cream) 0%,var(--cream-deep) 100%);display:flex;align-items:center;justify-content:center;font-size:80px}
.prem-merch-body{padding:22px;display:flex;flex-direction:column;flex:1;gap:8px}
.prem-merch-cat{font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--orange-dark)}
.prem-merch-body h3{font-family:var(--font-serif);font-weight:400;font-size:20px;color:var(--warm-dark);letter-spacing:-.2px}
.prem-merch-desc{font-size:13px;color:var(--warm-mid);line-height:1.5;flex:1}
.prem-merch-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--cream-line)}
.prem-merch-price{font-family:var(--font-serif);font-weight:400;font-size:22px;color:var(--coin-dark);display:inline-flex;align-items:center;gap:6px}
.prem-merch-stock{font-size:11px;color:var(--warm-mid);text-transform:uppercase;letter-spacing:1px}

/* Mega */
.prem-mega{background:var(--warm-dark);color:#fff;border-radius:20px;padding:48px 44px;display:flex;justify-content:space-between;align-items:center;gap:32px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 20px 60px -30px rgba(0,0,0,.55);transition:transform .2s}
.prem-mega:hover{transform:translateY(-2px)}
.prem-mega::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,var(--orange) 0%,var(--coin) 50%,var(--green) 100%)}
.prem-mega-label{font-size:11px;text-transform:uppercase;letter-spacing:3px;font-weight:700;color:var(--coin);margin-bottom:14px}
.prem-mega h2{font-family:var(--font-serif);font-weight:400;font-size:clamp(28px,3.8vw,44px);line-height:1.05;letter-spacing:-.5px;margin-bottom:14px}
.prem-mega h2 em{font-style:italic;color:var(--coin)}
.prem-mega p{font-size:15px;color:rgba(255,255,255,.75);line-height:1.55;max-width:520px}
.prem-mega-arrow{width:64px;height:64px;background:var(--coin);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--warm-dark);font-size:28px;flex-shrink:0;box-shadow:0 10px 24px -8px rgba(255,180,0,.55)}

/* Bikes */
.prem-bike-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}
.prem-bike{background:#fff;border:1px solid var(--cream-line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.prem-bike:hover{transform:translateY(-3px);box-shadow:0 18px 36px -20px rgba(42,31,18,.30)}
.prem-bike-img{aspect-ratio:4/3;background:linear-gradient(135deg,var(--cream) 0%,var(--cream-deep) 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
.prem-bike-img img{width:100%;height:100%;object-fit:contain;padding:14px}
.prem-bike-body{padding:22px;display:flex;flex-direction:column;gap:8px;flex:1}
.prem-bike-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;align-self:flex-start}
.prem-bike-tag.bikera{background:rgba(255,107,26,.15);color:var(--orange-dark)}
.prem-bike-tag.johansson{background:rgba(31,175,61,.15);color:var(--green-darker)}
.prem-bike-body h4{font-family:var(--font-serif);font-weight:400;font-size:20px;color:var(--warm-dark);letter-spacing:-.2px;line-height:1.15}
.prem-bike-variant{font-size:13px;color:var(--warm-mid)}
.prem-bike-motor{font-size:12px;color:var(--warm-mid);display:inline-flex;align-items:center;gap:6px}
.prem-bike-prices{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-top:6px;padding-top:10px;border-top:1px solid var(--cream-line)}
.prem-bike-uvp{font-size:13px;color:var(--warm-mid);text-decoration:line-through}
.prem-bike-ff{font-family:var(--font-serif);font-weight:400;font-size:24px;color:var(--warm-dark)}
.prem-bike-save{background:var(--coin);color:var(--warm-dark);padding:3px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:1px}

/* Filter bar */
.prem-filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.prem-filter-bar button{padding:8px 18px;border-radius:999px;background:#fff;border:1px solid var(--cream-line);font-size:13px;font-weight:600;color:var(--warm-mid);transition:background .15s,color .15s,border-color .15s}
.prem-filter-bar button:hover{border-color:var(--orange)}
.prem-filter-bar button.active{background:var(--warm-dark);color:#fff;border-color:var(--warm-dark)}

/* Challenges */
.prem-challenges{display:flex;flex-direction:column;gap:22px;margin-bottom:40px}
.prem-challenge{position:relative;background:linear-gradient(135deg,var(--warm-dark) 0%,#3a2b18 100%);color:#fff;border-radius:16px;padding:32px 34px;overflow:hidden;box-shadow:0 18px 40px -22px rgba(0,0,0,.45)}
.prem-challenge::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--orange) 0%,var(--coin) 50%,var(--green) 100%)}
.prem-challenge::after{content:"";position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,180,0,.30),transparent 65%);pointer-events:none}
.prem-challenge-eyebrow{font-size:11px;letter-spacing:2.5px;font-weight:700;color:var(--coin);text-transform:uppercase;margin-bottom:10px;position:relative;z-index:1}
.prem-challenge-title{font-family:var(--font-serif);font-weight:400;font-size:26px;color:#fff;letter-spacing:-.3px;margin-bottom:10px;position:relative;z-index:1;line-height:1.15}
.prem-challenge-desc{font-size:14px;color:rgba(255,255,255,.75);line-height:1.6;margin-bottom:18px;max-width:640px;position:relative;z-index:1}
.prem-challenge-reward{display:inline-flex;align-items:center;gap:10px;background:rgba(255,180,0,.15);border:1px solid rgba(255,180,0,.40);padding:8px 16px;border-radius:999px;position:relative;z-index:1}
.prem-challenge-reward-label{font-size:10px;color:var(--coin);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.prem-challenge-reward-value{font-family:var(--font-serif);font-size:15px;color:#fff}

  const { data: member } = await supa.from('members').select('*').eq('id', user.id).single();
  me = member || null;
  return me;

  if (adminOnly.includes(page) && (!me || me.role !== 'admin')) page = !me ? 'home' : 'pending';
  // AGB-Gate: eingeloggte, freigeschaltete Mitglieder müssen erst die AGB akzeptieren
  if (me && (me.status === 'approved' || me.role === 'admin') && !me.agb_accepted_at && page !== 'agb' && page !== 'impressum' && page !== 'datenschutz' && page !== 'faq' && page !== 'home' && page !== 'register'){
    page = 'agb';
  }
  const showTopbar = me && (me.status === 'approved' || me.role === 'admin') && me.agb_accepted_at;
  if (showTopbar){ renderTopbar(page); renderFooter(); }
  else { document.getElementById('topbarSlot').innerHTML=''; document.getElementById('footerSlot').innerHTML=''; }
  const inAppPages = ['members','coins','shop','codes','bikera','admin','pending','confirmed','impressum','datenschutz','faq','agb'];
  if (inAppPages.includes(page) && (me || page==='impressum' || page==='datenschutz' || page==='faq')) document.body.classList.add('in-app');
  else document.body.classList.remove('in-app');
  const views = { home:viewHome, register:viewRegister, pending:viewPending, confirmed:viewConfirmed, agb:viewAgb, members:viewMembers, coins:viewCoins, shop:viewShop, codes:viewCodes, bikera:viewBikera, admin:viewAdmin, impressum:viewImpressum, datenschutz:viewDatenschutz, faq:viewFaq };
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px 24px;color:var(--warm-mid);">Lade…</div>';
  const html = await (views[page] || viewHome)();
  document.getElementById('app').innerHTML = html;
  if (window.__afterRender){ try{ window.__afterRender(); } catch(e){ console.error(e); } window.__afterRender = null; }
}

async function viewAdmin(){

  const txs = isDemoMode() ? DEMO_TRANSACTIONS : ((await supa.from('coin_transactions').select('id, amount, type, description, order_number, created_at, member:member_id(first_name, last_name, email)').order('created_at',{ascending:false}).limit(40)).data || []);
  const anns = isDemoMode() ? DEMO_ANNOUNCEMENTS : ((await supa.from('announcements').select('*').order('created_at',{ascending:false})).data || []);
  const pendingM = members.filter(m => m.status === 'pending').length;
  const pendingR = reqs.filter(r => r.status === 'pending').length;
  const totalCoins = members.reduce((s,m) => s + (m.coins||0), 0);
  const memberOptions = members.filter(m => m.role !== 'admin').map(m => `<option value="${m.id}">${m.first_name} ${m.last_name} — ${m.email} (${fmtNum(m.coins||0)} MC)</option>`).join('');
  window.__afterRender = () => {
    document.getElementById('membersBody')?.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const a = document.getElementById('alert');
      if (isDemoMode()){ a.className='prem-alert success show'; a.textContent=`(Demo) Mitglied ${action === 'approve' ? 'freigeschaltet' : 'abgelehnt'}.`; return; }
      btn.disabled = true;
      const member = members.find(m => m.id === id);
      const updates = action === 'approve' ? { status: 'approved', approved_at: new Date().toISOString() } : { status: 'rejected' };
      const { error } = await supa.from('members').update(updates).eq('id', id);
      if (error){ a.className='prem-alert error show'; a.textContent='Fehler: '+error.message; btn.disabled=false; return; }
      if (action === 'approve' && member){
        try { await fetch('/api/notify-approval', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: member.email, firstName: member.first_name }) }); } catch(e){}
      }
      a.className='prem-alert success show';
      a.textContent = action === 'approve' ? 'Freigeschaltet.' : 'Abgelehnt.';
      setTimeout(() => route('admin'), 900);
    });
    document.getElementById('reqBody')?.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-req]');
      if (!btn) return;
      const reqId = parseInt(btn.dataset.req);

        const input = document.querySelector(`input[data-req-input="${reqId}"]`);

      }
      if (isDemoMode()){ a.className='prem-alert success show'; a.textContent = action === 'approve' ? `(Demo) ${coins} MC freigegeben.` : '(Demo) Abgelehnt.'; return; }
      btn.disabled = true;
      const { data, error } = await supa.rpc('review_coin_request', { p_request_id: reqId, p_action: action, p_coins: coins, p_admin_note: '' });
      if (error){ a.className='prem-alert error show'; a.textContent='Fehler: '+error.message; btn.disabled=false; return; }

      a.className='prem-alert success show';
      a.textContent = action === 'approve' ? `${coins} MC freigegeben.` : 'Abgelehnt.';

      btn.disabled = false; btn.textContent = 'Coins buchen';
      if (error){ a.className='prem-alert error show'; a.textContent='Fehler: '+error.message; return; }
      if (data && data.error){ a.className='prem-alert error show'; a.textContent=data.error; return; }
      a.className='prem-alert success show'; a.textContent=`${amount > 0 ? '+' : ''}${fmtNum(amount)} MC gebucht.`;
      e.target.reset();
      setTimeout(() => route('admin'), 900);

    document.getElementById('announcementForm')?.addEventListener('submit', async (e) => {

      if (error){ a.className='prem-alert error show'; a.textContent='Fehler: '+error.message; return; }
      a.className='prem-alert success show'; a.textContent='Challenge veröffentlicht.';
      e.target.reset(); setTimeout(() => route('admin'), 700);
    });
    document.getElementById('annList')?.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-ann]');
      if (!btn) return;
      const id = parseInt(btn.dataset.ann);
      const act = btn.dataset.act;
      const a = document.getElementById('alert');
      if (isDemoMode()){
        if (act === 'delete'){ const i = DEMO_ANNOUNCEMENTS.findIndex(x => x.id === id); if (i >= 0) DEMO_ANNOUNCEMENTS.splice(i,1); }
        else if (act === 'toggle'){ const x = DEMO_ANNOUNCEMENTS.find(x => x.id === id); if (x) x.is_active = !x.is_active; }
        a.className='prem-alert success show'; a.textContent='(Demo) aktualisiert.';
        setTimeout(() => route('admin'), 500); return;
      }
      if (act === 'delete'){
        if (!confirm('Challenge wirklich löschen?')) return;
        const { error } = await supa.from('announcements').delete().eq('id', id);
        if (error){ a.className='prem-alert error show'; a.textContent='Fehler: '+error.message; return; }
      } else if (act === 'toggle'){

(async () => {
  window.addEventListener('hashchange', () => { const p = window.location.hash.replace('#','') || 'home'; route(p); });
  supa.auth.onAuthStateChange(async (event) => {
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') await loadMe();
    else if (event === 'SIGNED_OUT'){ if (!isDemoMode()) me = null; }
  });
  await loadMe();
  const hash = window.location.hash.replace('#','');
  if (hash) route(hash);
  else if (me && (me.status === 'approved' || me.role === 'admin')) route(me.role === 'admin' ? 'admin' : 'members');
  else if (me) route('pending');
  else route('home');
})();
</script>
