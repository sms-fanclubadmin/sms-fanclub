<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michas Knock Knock Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --orange:#FF6B1A; --orange-dark:#E5570F;
  --green:#1FAF3D; --green-dark:#157A28; --green-darker:#0E521B;
  --coin:#FFB400; --coin-dark:#B07F00;
  --white:#FFFFFF; --cream:#FFF5E8;
  --text:#1F0E03; --text-light:#5C3818; --text-muted:#8A6A45;
  --cream-bg:#FAF5ED; --cream-deep:#F0E6D2; --cream-line:#E5D6BB;
  --warm-dark:#2A1F12; --warm-mid:#5A3F22;
  --radius:14px; --radius-sm:8px; --radius-lg:20px;
  --shadow-sm:0 2px 8px rgba(31,14,3,.10); --shadow:0 8px 24px rgba(31,14,3,.18); --shadow-lg:0 16px 40px rgba(31,14,3,.22);
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --font-display:'Bebas Neue','Anton','Impact',sans-serif;
  --font-serif:'DM Serif Display','Playfair Display',Georgia,serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { background:var(--cream-bg); color:var(--warm-dark); font-family:var(--font); min-height:100vh; -webkit-font-smoothing:antialiased; font-weight:400; }
body.in-app { background:var(--cream-bg); }
img { max-width:100%; height:auto; }
a { color:inherit; }

/* ==================== LOGIN (EXAKT wie spezifiziert) ==================== */
.prem-login { position:relative; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; overflow:hidden; }
.prem-login-bg { position:absolute; inset:0; background:linear-gradient(135deg,#1a0f06 0%,#3a200c 35%,#6b3a14 70%,#8a4517 100%); z-index:1; }
.prem-login-bg::before { content:''; position:absolute; inset:0; background:radial-gradient(900px 700px at 20% 20%, rgba(255,107,26,.28), transparent 60%), radial-gradient(800px 600px at 85% 85%, rgba(240,190,42,.14), transparent 65%), radial-gradient(600px 400px at 50% 110%, rgba(229,87,15,.22), transparent 70%); }
.prem-login-bg::after { content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:linear-gradient(90deg,transparent 0%,rgba(255,107,26,.18) 50%,transparent 100%); }
.prem-login-shell { position:relative; z-index:2; width:100%; max-width:520px; display:flex; flex-direction:column; align-items:center; gap:0; }
.prem-login-logo { width:340px; max-width:90%; background:rgba(255,255,255,.97); border-radius:8px; padding:18px 28px; box-shadow:0 20px 60px -14px rgba(0,0,0,.60), 0 0 0 1px rgba(255,107,26,.20); margin-bottom:28px; }
.prem-login-logo svg, .prem-login-logo img { display:block; width:100%; height:auto; }
.prem-login-brand { text-align:center; margin-bottom:30px; }
.prem-login-eyebrow-top { font-size:11px; text-transform:uppercase; letter-spacing:5px; color:var(--orange); font-weight:800; margin-bottom:14px; }
.prem-login-brand-title { font-family:var(--font-serif); font-weight:400; font-size:clamp(32px,4.5vw,46px); line-height:1.05; color:#fff; letter-spacing:-.4px; text-shadow:0 4px 22px rgba(0,0,0,.45); }
.prem-login-brand-title em { font-style:italic; color:var(--orange); }
.prem-login-divider { width:48px; height:1px; background:rgba(255,107,26,.55); position:relative; margin:0 auto 30px; }
.prem-login-divider span { position:absolute; left:50%; top:-3px; width:7px; height:7px; background:var(--orange); border-radius:50%; transform:translateX(-50%); box-shadow:0 0 12px rgba(255,107,26,.7); }
.prem-login-card { background:rgba(255,255,255,.97); border-radius:8px; padding:42px 38px 32px; width:100%; box-shadow:0 30px 80px -20px rgba(0,0,0,.55), 0 0 0 1px rgba(255,107,26,.22), 0 0 60px -10px rgba(255,107,26,.18); border-top:3px solid var(--orange); }
.prem-login-eyebrow { font-size:10px; text-transform:uppercase; letter-spacing:4px; color:var(--orange-dark); font-weight:700; margin-bottom:14px; }
.prem-login-title { font-family:var(--font-serif); font-weight:400; font-size:34px; line-height:1.05; color:var(--warm-dark); letter-spacing:-.3px; margin-bottom:10px; }
.prem-login-sub { color:var(--text-muted); font-size:14px; line-height:1.55; margin-bottom:26px; }
.prem-login-foot { text-align:center; margin-top:24px; }
.prem-login-meta { color:rgba(255,255,255,.55); font-size:11px; text-transform:uppercase; letter-spacing:3px; margin-top:30px; text-align:center; font-weight:600; }
.prem-form { display:flex; flex-direction:column; gap:18px; }
.prem-label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.8px; font-weight:700; color:var(--warm-mid); }
.prem-input { width:100%; margin-top:8px; background:transparent; border:none; border-bottom:1.5px solid var(--cream-line); padding:11px 0 11px; font-size:16px; font-family:inherit; font-weight:500; color:var(--warm-dark); border-radius:0; transition:border-color .2s ease; }
.prem-input:focus { outline:none; border-bottom-color:var(--orange); }
select.prem-input { -webkit-appearance:none; -moz-appearance:none; appearance:none; background:transparent; }
textarea.prem-input { min-height:90px; border:1.5px solid var(--cream-line); border-radius:6px; padding:12px 14px; resize:vertical; }
textarea.prem-input:focus { border-color:var(--orange); }

/* ==================== BUTTONS ==================== */
.prem-btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; padding:16px 30px; border-radius:999px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:2px; cursor:pointer; border:none; font-family:inherit; transition:transform .15s ease, background .15s ease; text-decoration:none; }
.prem-btn:disabled { opacity:.5; cursor:not-allowed; }
.prem-btn-primary { background:var(--warm-dark); color:#fff; }
.prem-btn-primary:hover { background:var(--orange-dark); transform:translateY(-1px); }
.prem-btn-orange { background:var(--orange); color:#fff; box-shadow:0 6px 18px -6px rgba(255,107,26,.55); }
.prem-btn-orange:hover { background:var(--orange-dark); transform:translateY(-1px); box-shadow:0 10px 24px -6px rgba(255,107,26,.65); }
.prem-btn-coin { background:var(--coin); color:var(--warm-dark); }
.prem-btn-coin:hover { background:#FFA000; transform:translateY(-1px); }
.prem-btn-ghost { background:transparent; color:var(--warm-dark); border:1.5px solid var(--cream-line); }
.prem-btn-ghost:hover { background:var(--cream-deep); border-color:var(--warm-mid); }
.prem-btn-sm { padding:10px 18px; font-size:11px; letter-spacing:1.5px; }
.prem-btn-danger { background:#9C2C1F; color:#fff; }
.prem-btn-danger:hover { background:#7C1F14; }
.prem-btn-block { width:100%; margin-top:6px; }
.prem-link-quiet { color:var(--warm-mid); font-size:13px; letter-spacing:.5px; cursor:pointer; text-decoration:none; border-bottom:1px solid var(--cream-line); padding-bottom:2px; transition:color .2s ease, border-color .2s ease; }
.prem-link-quiet:hover { color:var(--orange-dark); border-color:var(--orange); }

/* ==================== TOPBAR (in-app) ==================== */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 40px; background:#fff; border-bottom:1px solid var(--cream-line); position:sticky; top:0; z-index:100; gap:16px; flex-wrap:wrap; }
body.in-app .topbar { background:#fff; }
.brand { display:flex; align-items:center; gap:14px; cursor:pointer; }
.brand-logo-mini { width:140px; flex-shrink:0; }
.brand-logo-mini svg, .brand-logo-mini img { display:block; width:100%; height:auto; }
.brand-text { display:flex; flex-direction:column; line-height:1.1; padding-left:14px; border-left:1px solid var(--cream-line); }
.brand-text strong { font-family:var(--font-serif); font-size:18px; font-weight:400; letter-spacing:-.2px; color:var(--warm-dark); }
.brand-text strong em { font-style:italic; color:var(--orange); }
.brand-text span { color:var(--warm-mid); font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:700; margin-top:2px; }
.topnav { display:flex; gap:2px; align-items:center; flex-wrap:wrap; }
.topnav button { background:none; border:none; color:var(--warm-mid); padding:10px 14px; border-radius:6px; font-weight:700; font-size:11px; cursor:pointer; font-family:inherit; text-transform:uppercase; letter-spacing:1.5px; transition:color .15s ease, background .15s ease; }
body.in-app .topnav button { color:var(--warm-mid); }
.topnav button:hover { color:var(--orange-dark); }
.topnav button.active { color:var(--orange-dark); background:rgba(255,107,26,.09); }
.coin-chip { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--coin) 0%,#FFA000 100%); color:var(--warm-dark); padding:6px 14px 6px 6px; border-radius:999px; font-weight:800; font-size:13px; cursor:pointer; box-shadow:0 6px 16px -4px rgba(255,180,0,.5); border:none; font-family:inherit; }
body.in-app .coin-chip { background:linear-gradient(135deg,var(--coin) 0%,#FFA000 100%); color:var(--warm-dark); }

/* ==================== HERO / SECTION ==================== */
.prem-hero { max-width:1200px; margin:0 auto; padding:70px 40px 40px; }
.prem-eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:4px; color:var(--orange-dark); font-weight:700; margin-bottom:16px; }
.prem-hero h1 { font-family:var(--font-serif); font-weight:400; font-size:clamp(38px,5.5vw,64px); line-height:1.02; color:var(--warm-dark); letter-spacing:-.8px; margin-bottom:18px; }
.prem-hero h1 em { font-style:italic; color:var(--orange-dark); }
.prem-hero-lead { color:var(--warm-mid); font-size:16px; line-height:1.6; max-width:640px; }
.prem-section { max-width:1200px; margin:0 auto; padding:20px 40px 40px; }
.prem-section-head { margin-bottom:28px; }
.prem-section-eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:4px; color:var(--orange-dark); font-weight:700; margin-bottom:10px; }
.prem-section-head h2 { font-family:var(--font-serif); font-weight:400; font-size:clamp(28px,3.5vw,40px); line-height:1.05; color:var(--warm-dark); letter-spacing:-.4px; }
.prem-section-head h2 em { font-style:italic; color:var(--orange-dark); }
.prem-section-head p { color:var(--warm-mid); font-size:15px; line-height:1.6; margin-top:10px; max-width:640px; }

/* ==================== CARD ==================== */
.prem-card { background:#fff; border:1px solid var(--cream-line); border-radius:10px; padding:32px 34px; box-shadow:0 12px 32px -18px rgba(42,31,18,.18); }
.prem-card h3 { font-family:var(--font-serif); font-weight:400; font-size:24px; color:var(--warm-dark); margin-bottom:12px; letter-spacing:-.2px; }
.prem-card h3 em { font-style:italic; color:var(--orange-dark); }
.prem-card p { color:var(--warm-mid); font-size:14px; line-height:1.7; margin-bottom:12px; }
.prem-card ul { color:var(--warm-mid); font-size:14px; line-height:1.75; padding-left:22px; margin-bottom:12px; }
.prem-card li { margin-bottom:6px; }

/* ==================== BALANCE ==================== */
.prem-balance { max-width:1200px; margin:36px auto 0; padding:0 40px; }
.prem-balance-inner { background:linear-gradient(135deg, #fff 0%, var(--cream-bg) 100%); border:1px solid var(--cream-line); border-radius:14px; padding:32px 36px; display:flex; align-items:center; gap:28px; box-shadow:0 12px 32px -14px rgba(42,31,18,.18); flex-wrap:wrap; }
.prem-balance-coin { flex-shrink:0; }
.prem-balance-body { flex-grow:1; min-width:200px; }
.prem-balance-label { font-size:10px; text-transform:uppercase; letter-spacing:3px; color:var(--warm-mid); font-weight:700; margin-bottom:8px; }
.prem-balance-num { font-family:var(--font-serif); font-weight:400; font-size:64px; line-height:1; color:var(--warm-dark); letter-spacing:-1px; }
.prem-balance-meta { font-size:13px; color:var(--warm-mid); margin-top:6px; }

/* ==================== TILES ==================== */
.prem-tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; max-width:1200px; margin:32px auto 0; padding:0 40px; }
@media (max-width:900px) { .prem-tiles { grid-template-columns:1fr; } }
.prem-tile { background:#fff; border:1px solid var(--cream-line); border-radius:12px; padding:30px 28px; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; display:flex; flex-direction:column; gap:12px; }
.prem-tile:hover { transform:translateY(-3px); box-shadow:0 18px 40px -18px rgba(42,31,18,.28); border-color:var(--orange); }
.prem-tile-eyebrow { font-size:10px; text-transform:uppercase; letter-spacing:3px; color:var(--orange-dark); font-weight:700; }
.prem-tile h3 { font-family:var(--font-serif); font-weight:400; font-size:26px; color:var(--warm-dark); line-height:1.1; letter-spacing:-.3px; }
.prem-tile h3 em { font-style:italic; color:var(--orange-dark); }
.prem-tile p { color:var(--warm-mid); font-size:14px; line-height:1.55; }
.prem-tile-cta { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--orange-dark); font-weight:700; margin-top:auto; padding-top:8px; }

/* ==================== FORM CARD ==================== */
.prem-form-card { background:#fff; border:1px solid var(--cream-line); border-radius:10px; padding:32px 34px; box-shadow:0 12px 32px -18px rgba(42,31,18,.18); }
.prem-form-card h3 { font-family:var(--font-serif); font-weight:400; font-size:22px; color:var(--warm-dark); margin-bottom:8px; letter-spacing:-.2px; }
.prem-form-card h3 em { font-style:italic; color:var(--orange-dark); }
.prem-form-card p.sub { color:var(--warm-mid); font-size:13px; line-height:1.55; margin-bottom:20px; }

/* ==================== TABLE ==================== */
.prem-table-wrap { overflow-x:auto; background:#fff; border:1px solid var(--cream-line); border-radius:10px; box-shadow:0 12px 32px -18px rgba(42,31,18,.14); }
.prem-table { width:100%; border-collapse:collapse; }
.prem-table th, .prem-table td { padding:14px 18px; text-align:left; border-bottom:1px solid var(--cream-line); font-size:13px; color:var(--warm-dark); vertical-align:middle; }
.prem-table th { background:var(--cream-bg); color:var(--warm-mid); font-size:10px; text-transform:uppercase; letter-spacing:2px; font-weight:700; }
.prem-table tr:last-child td { border-bottom:none; }
.prem-pill { display:inline-block; padding:4px 12px; border-radius:999px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; }
.prem-pill.pending { background:rgba(255,180,0,.22); color:var(--coin-dark); }
.prem-pill.approved { background:rgba(31,175,61,.18); color:var(--green-darker); }
.prem-pill.rejected { background:rgba(156,44,31,.14); color:#7C1F14; }
.prem-pill.admin { background:rgba(255,107,26,.18); color:var(--orange-dark); }

/* ==================== SHOP ==================== */
.prem-merch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:22px; }
.prem-merch { background:#fff; border:1px solid var(--cream-line); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; transition:transform .15s ease, box-shadow .15s ease; }
.prem-merch:hover { transform:translateY(-3px); box-shadow:0 18px 40px -18px rgba(42,31,18,.28); }
.prem-merch-img { background:linear-gradient(135deg, var(--cream-bg), var(--cream-deep)); font-size:80px; text-align:center; padding:36px 0; }
.prem-merch-body { padding:22px 22px 20px; display:flex; flex-direction:column; flex-grow:1; }
.prem-merch-cat { font-size:9px; text-transform:uppercase; letter-spacing:2.5px; color:var(--orange-dark); font-weight:800; margin-bottom:8px; }
.prem-merch h4 { font-family:var(--font-serif); font-weight:400; font-size:20px; color:var(--warm-dark); margin-bottom:6px; letter-spacing:-.2px; }
.prem-merch-desc { color:var(--warm-mid); font-size:13px; line-height:1.55; flex-grow:1; margin-bottom:14px; }
.prem-merch-foot { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
.prem-merch-price { font-family:var(--font-serif); font-weight:400; font-size:26px; color:var(--warm-dark); display:inline-flex; align-items:center; gap:8px; letter-spacing:-.3px; }

/* ==================== FILTER BAR ==================== */
.prem-filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
.prem-filter-bar button { background:#fff; color:var(--warm-mid); border:1px solid var(--cream-line); padding:8px 18px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer; font-family:inherit; transition:all .15s ease; }
.prem-filter-bar button:hover { border-color:var(--orange); color:var(--orange-dark); }
.prem-filter-bar button.active { background:var(--warm-dark); color:#fff; border-color:var(--warm-dark); }

/* ==================== MEGA ==================== */
.prem-mega { background:linear-gradient(135deg, #2A1F12 0%, #6b3a14 100%); color:#fff; border-radius:16px; padding:44px 40px; cursor:pointer; box-shadow:0 24px 60px -20px rgba(42,31,18,.5); transition:transform .15s ease; display:flex; flex-direction:column; gap:14px; position:relative; overflow:hidden; }
.prem-mega:hover { transform:translateY(-3px); }
.prem-mega::before { content:''; position:absolute; inset:0; background:radial-gradient(700px 400px at 90% 10%, rgba(255,107,26,.35), transparent 60%); }
.prem-mega > * { position:relative; z-index:1; }
.prem-mega-label { display:inline-block; align-self:flex-start; background:var(--coin); color:var(--warm-dark); padding:5px 14px; border-radius:999px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2px; }
.prem-mega h2 { font-family:var(--font-serif); font-weight:400; font-size:clamp(28px,4vw,42px); line-height:1.05; letter-spacing:-.4px; }
.prem-mega h2 em { font-style:italic; color:var(--orange); }
.prem-mega p { color:rgba(255,255,255,.85); font-size:15px; line-height:1.55; max-width:640px; }
.prem-mega-arrow { font-family:var(--font-serif); font-size:22px; color:var(--orange); margin-top:6px; letter-spacing:1px; }

/* ==================== BIKES ==================== */
.prem-bike-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:22px; }
.prem-bike { background:#fff; border:1px solid var(--cream-line); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 8px 24px -16px rgba(42,31,18,.2); transition:transform .15s ease, box-shadow .15s ease; }
.prem-bike:hover { transform:translateY(-3px); box-shadow:0 18px 40px -18px rgba(42,31,18,.28); }
.prem-bike-img { background:linear-gradient(135deg, var(--cream-bg), var(--cream-deep)); text-align:center; padding:22px; }
.prem-bike-img img { max-height:180px; width:auto; margin:0 auto; display:block; }
.prem-bike-body { padding:22px 24px 24px; display:flex; flex-direction:column; flex-grow:1; }
.prem-bike-tag { display:inline-block; align-self:flex-start; padding:4px 10px; border-radius:999px; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }
.prem-bike-tag.bikera { background:rgba(255,107,26,.16); color:var(--orange-dark); }
.prem-bike-tag.johansson { background:rgba(31,175,61,.14); color:var(--green-darker); }
.prem-bike h4 { font-family:var(--font-serif); font-weight:400; font-size:20px; color:var(--warm-dark); margin-bottom:6px; letter-spacing:-.2px; }
.prem-bike-variant { color:var(--warm-mid); font-size:13px; margin-bottom:2px; }
.prem-bike-motor { color:var(--text-muted); font-size:12px; margin-bottom:14px; }
.prem-bike-prices { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-top:auto; }
.prem-bike-uvp { color:var(--text-muted); font-size:13px; text-decoration:line-through; }
.prem-bike-ff { font-family:var(--font-serif); font-weight:400; font-size:28px; color:var(--orange-dark); letter-spacing:-.3px; }
.prem-bike-save { background:var(--coin); color:var(--warm-dark); padding:3px 10px; border-radius:4px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; }

/* ==================== CHALLENGES ==================== */
.prem-challenges { max-width:1200px; margin:32px auto 0; padding:0 40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:22px; }
.prem-challenge { background:linear-gradient(135deg,#fff 0%, var(--cream-bg) 100%); border:1px solid var(--cream-line); border-left:4px solid var(--orange); border-radius:12px; padding:26px 28px; display:flex; flex-direction:column; gap:10px; box-shadow:0 12px 32px -18px rgba(42,31,18,.16); }
.prem-challenge-eyebrow { font-size:10px; text-transform:uppercase; letter-spacing:3px; color:var(--orange-dark); font-weight:800; }
.prem-challenge-title { font-family:var(--font-serif); font-weight:400; font-size:24px; color:var(--warm-dark); line-height:1.15; letter-spacing:-.2px; }
.prem-challenge-desc { color:var(--warm-mid); font-size:13.5px; line-height:1.55; }
.prem-challenge-reward { display:flex; align-items:center; gap:10px; background:rgba(255,180,0,.16); padding:10px 14px; border-radius:8px; margin-top:6px; }
.prem-challenge-reward-label { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--coin-dark); font-weight:800; }
.prem-challenge-reward-value { font-size:13px; color:var(--warm-dark); font-weight:700; }
.prem-challenge-deadline { font-size:11px; color:var(--warm-mid); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }

/* ==================== ADMIN ANN ==================== */
.prem-compose { background:#fff; border:1px solid var(--cream-line); border-radius:12px; padding:26px 28px; box-shadow:0 12px 32px -18px rgba(42,31,18,.16); }
.prem-ann-list { display:flex; flex-direction:column; gap:12px; margin-top:22px; }
.prem-ann-row { background:#fff; border:1px solid var(--cream-line); border-radius:10px; padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.prem-ann-row.inactive { opacity:.55; }
.prem-ann-meta { display:flex; flex-direction:column; gap:4px; }
.prem-ann-meta strong { font-family:var(--font-serif); font-weight:400; font-size:18px; color:var(--warm-dark); }
.prem-ann-meta small { color:var(--warm-mid); font-size:12px; }
.prem-ann-reward { color:var(--coin-dark); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; }

/* ==================== AGB ==================== */
.prem-agb { min-height:100vh; background:var(--cream-bg); padding:60px 24px; }
.prem-agb-shell { max-width:820px; margin:0 auto; }
.prem-agb-head { text-align:center; margin-bottom:36px; }
.prem-agb-eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:3px; font-weight:700; color:var(--orange-dark); margin-bottom:14px; }
.prem-agb-title { font-family:var(--font-serif); font-weight:400; font-size:clamp(34px,4.5vw,52px); line-height:1.05; color:var(--warm-dark); letter-spacing:-.5px; margin-bottom:14px; }
.prem-agb-title em { font-style:italic; color:var(--orange-dark); }
.prem-agb-sub { color:var(--warm-mid); font-size:15px; line-height:1.65; max-width:600px; margin:0 auto; }
.prem-agb-scroll { background:#fff; border:1px solid var(--cream-line); border-radius:8px; padding:40px 44px; max-height:560px; overflow-y:auto; box-shadow:0 12px 32px -14px rgba(42,31,18,.16); margin-bottom:28px; }
.prem-agb-scroll h3 { font-family:var(--font-serif); font-weight:400; font-size:19px; color:var(--warm-dark); margin:26px 0 10px; letter-spacing:-.2px; }
.prem-agb-scroll h3:first-child { margin-top:0; }
.prem-agb-scroll p { color:var(--warm-dark); font-size:14px; line-height:1.75; margin-bottom:12px; }
.prem-agb-scroll p.sub { color:var(--warm-mid); font-size:13px; }
.prem-agb-scroll ul { padding-left:22px; color:var(--warm-dark); font-size:14px; line-height:1.75; margin-bottom:12px; }
.prem-agb-scroll li { margin-bottom:6px; }
.prem-agb-check-row { display:flex; align-items:flex-start; gap:14px; background:#fff; border:1px solid var(--cream-line); border-radius:6px; padding:22px 24px; margin-bottom:20px; cursor:pointer; }
.prem-agb-check-row:hover { border-color:var(--orange); }
.prem-agb-check-row input[type=checkbox] { width:22px; height:22px; accent-color:var(--orange); flex-shrink:0; margin-top:2px; cursor:pointer; }
.prem-agb-check-label { color:var(--warm-dark); font-size:14px; line-height:1.6; }
.prem-agb-check-label strong { color:var(--warm-dark); }
.prem-agb-actions { display:flex; gap:14px; justify-content:flex-end; flex-wrap:wrap; }

/* ==================== FOOTER ==================== */
.prem-footer { background:var(--warm-dark); color:rgba(255,255,255,.75); padding:60px 40px 30px; margin-top:80px; position:relative; }
.prem-footer-stripe { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, var(--orange) 0%, var(--coin) 50%, var(--orange-dark) 100%); }
.prem-footer-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:40px; }
@media (max-width:800px) { .prem-footer-inner { grid-template-columns:1fr; } }
.prem-footer-logo { width:220px; background:rgba(255,255,255,.97); border-radius:6px; padding:14px 20px; margin-bottom:20px; }
.prem-footer-logo img, .prem-footer-logo svg { display:block; width:100%; height:auto; }
.prem-footer h5 { color:#fff; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:14px; font-weight:800; }
.prem-footer a { color:rgba(255,255,255,.65); font-size:13px; line-height:1.9; text-decoration:none; display:block; cursor:pointer; transition:color .15s ease; }
.prem-footer a:hover { color:var(--orange); }
.prem-footer p { color:rgba(255,255,255,.65); font-size:13px; line-height:1.7; }
.prem-footer-bottom { border-top:1px solid rgba(255,255,255,.12); margin-top:50px; padding-top:20px; text-align:center; font-size:11px; color:rgba(255,255,255,.45); letter-spacing:1.5px; text-transform:uppercase; max-width:1200px; margin-left:auto; margin-right:auto; }

/* ==================== ALERTS + SPINNER ==================== */
.alert { padding:14px 18px; border-radius:8px; margin-bottom:18px; font-size:14px; display:none; font-weight:600; }
.alert.show { display:block; }
.alert.success { background:rgba(31,175,61,.15); color:var(--green-darker); border-left:4px solid var(--green); }
.alert.error { background:rgba(156,44,31,.12); color:#7C1F14; border-left:4px solid #9C2C1F; }
.alert.coin { background:rgba(255,180,0,.18); color:var(--coin-dark); border-left:4px solid var(--coin); }
.spinner { display:inline-block; width:18px; height:18px; border:3px solid rgba(42,31,18,.15); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

            `).join('')}
          </tbody>
        </table>

async function viewShop() {
  const items = await loadMerch();
  const cats = ['Alle', ...Array.from(new Set(items.map(i => i.category)))];
  window.__afterRender = () => {
    let activeCat = 'Alle';
    const render = () => {
      const list = activeCat === 'Alle' ? items : items.filter(i => i.category === activeCat);
      document.getElementById('merchGrid').innerHTML = list.map(i => {
        const tooLow = (me.coins || 0) < i.coin_price;
        return `
          <div class="prem-merch">
            <div class="prem-merch-img">${i.emoji || '📦'}</div>
            <div class="prem-merch-body">
              <div class="prem-merch-cat">${esc(i.category || '')}</div>
              <h4>${esc(i.name)}</h4>
              <div class="prem-merch-desc">${esc(i.description || '')}</div>
              <div class="prem-merch-foot">
                <div class="prem-merch-price">${coinImg(18)} ${fmtNum(i.coin_price)}</div>
              </div>
              <button class="prem-btn prem-btn-orange prem-btn-sm prem-btn-block" ${tooLow ? 'disabled' : ''} onclick="buyMerch(${i.id})">${tooLow ? 'Zu wenig MC' : `Mit ${fmtNum(i.coin_price)} MC bezahlen`}</button>
            </div>
          </div>
        `;
      }).join('');
    };
    document.querySelectorAll('[data-cat]').forEach(b => {
      b.addEventListener('click', () => {
        activeCat = b.dataset.cat;
        document.querySelectorAll('[data-cat]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        render();
      });
    });
    render();
    window.buyMerch = async (id) => {
      const item = items.find(x => x.id === id);
      if (!item) return;
      if ((me.coins || 0) < item.coin_price) { alert('Zu wenig Coins.'); return; }
      if (!confirm(`Wirklich "${item.name}" für ${item.coin_price} MC einlösen?`)) return;
      if (isDemoMode()) {
        me.coins -= item.coin_price;
        DEMO_USERS[me.email].data.coins = me.coins;
        DEMO_TRANSACTIONS.unshift({ id:Date.now(), member_id:me.id, amount:-item.coin_price, type:'shop_purchase', description:`Shop: ${item.name}`, created_at:new Date().toISOString(), member:{first_name:me.first_name,last_name:me.last_name,email:me.email} });
        alert('Bestellung erfasst. Das SMS-Team meldet sich zur Übergabe.');
        route('shop');
        return;
      }
      const { error } = await supa.rpc('purchase_merch', { p_merch_id: id });
      if (error) { alert('Fehler: '+error.message); return; }
      alert('Bestellung erfasst.');
      route('shop');
    };
  };
  return `
    <div class="prem-hero">
      <div class="prem-eyebrow">Merchandise</div>
      <h1>SMS <em>Merch.</em></h1>
      <p class="prem-hero-lead">Lösen Sie Ihre Maverick Coins gegen exklusive SMS-Artikel ein.</p>
    </div>
    <div style="max-width:1200px;margin:32px auto 0;padding:0 40px;">
      <div style="background:linear-gradient(135deg,#fff 0%,var(--cream-bg) 100%);border:1px solid var(--cream-line);border-radius:12px;padding:22px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
        <div>${coinImg(36)}</div>
        <div style="flex-grow:1;">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--warm-mid);font-weight:700;">Dein Guthaben</div>
          <div style="font-family:var(--font-serif);font-size:32px;color:var(--warm-dark);letter-spacing:-.3px;">${fmtNum(me.coins || 0)} MC</div>
        </div>
      </div>
    </div>
    <div class="prem-section">
      <div class="prem-filter-bar">
        ${cats.map((c,idx) => `<button data-cat="${esc(c)}" class="${idx===0?'active':''}">${esc(c)}</button>`).join('')}
      </div>
      <div class="prem-merch-grid" id="merchGrid"></div>
    </div>
    <div style="height:60px;"></div>`;
}

async function viewAdmin() {
  const reqs = await loadAllRequests();
  const members = await loadAllMembers();
  const txs = await loadAllTx();
  const anns = await loadAllAnnouncements();
  const pendingReqs = reqs.filter(r => r.status === 'pending');
  const totalCoins = members.reduce((s,m) => s + (m.coins || 0), 0);
  window.__afterRender = () => {
    // announcements form
    const annForm = document.getElementById('annForm');
    if (annForm) annForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const record = {
        title: f.annTitle.value.trim(),
        description: f.annDesc.value.trim(),
        reward: f.annReward.value.trim() || null,
        deadline: f.annDeadline.value || null,
        is_active: true
      };
      if (isDemoMode()) {
        DEMO_ANNOUNCEMENTS.unshift({ id:Date.now(), ...record, created_at:new Date().toISOString() });
        route('admin');
        return;
      }
      const { error } = await supa.from('announcements').insert(record);
      if (error) { alert('Fehler: '+error.message); return; }
      route('admin');
    });

    // request row inputs
    document.querySelectorAll('[data-approve]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.approve);
        const input = document.querySelector(`[data-req-input="${id}"]`);
        const coins = Number(input.value);
        if (!coins || coins <= 0) { alert('Bitte gültige Coin-Anzahl eintragen.'); return; }
        if (isDemoMode()) {
          const r = DEMO_REQUESTS.find(x => x.id === id);
          if (r) { r.status = 'approved'; r.coins_awarded = coins; }
          const m = DEMO_MEMBERS.find(x => x.id === r.member_id);
          if (m) m.coins = (m.coins || 0) + coins;
          if (r && DEMO_USERS[r.member.email]) DEMO_USERS[r.member.email].data.coins = (DEMO_USERS[r.member.email].data.coins || 0) + coins;
          DEMO_TRANSACTIONS.unshift({ id:Date.now(), member_id:r.member_id, amount:coins, type:'order_reward', order_number:r.order_number, description:`Auftrag #${r.order_number} freigegeben`, created_at:new Date().toISOString(), member:r.member });
          route('admin');
          return;
        }
        const { error } = await supa.rpc('approve_coin_request', { p_request_id: id, p_coins: coins });
        if (error) { alert('Fehler: '+error.message); return; }
        route('admin');
      });
    });
    document.querySelectorAll('[data-reject]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.reject);
        if (!confirm('Diesen Auftrag ablehnen?')) return;
        if (isDemoMode()) {
          const r = DEMO_REQUESTS.find(x => x.id === id);
          if (r) r.status = 'rejected';
          route('admin');
          return;
        }
        const { error } = await supa.from('coin_requests').update({ status:'rejected' }).eq('id', id);
        if (error) { alert('Fehler: '+error.message); return; }
        route('admin');
      });
    });
    // announcement toggle/delete
    document.querySelectorAll('[data-ann-toggle]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.annToggle);
        if (isDemoMode()) {
          const a = DEMO_ANNOUNCEMENTS.find(x => x.id === id);
          if (a) a.is_active = !a.is_active;
          route('admin');
          return;
        }
        const a = anns.find(x => x.id === id);
        const { error } = await supa.from('announcements').update({ is_active: !a.is_active }).eq('id', id);
        if (error) { alert('Fehler: '+error.message); return; }
        route('admin');
      });
    });
    document.querySelectorAll('[data-ann-del]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.annDel);
        if (!confirm('Challenge wirklich löschen?')) return;
        if (isDemoMode()) {
          const idx = DEMO_ANNOUNCEMENTS.findIndex(x => x.id === id);
          if (idx >= 0) DEMO_ANNOUNCEMENTS.splice(idx, 1);
          route('admin');
          return;
        }
        const { error } = await supa.from('announcements').delete().eq('id', id);
        if (error) { alert('Fehler: '+error.message); return; }
        route('admin');
      });
    });
    // coin grant
    const grantForm = document.getElementById('coinGrantForm');
    if (grantForm) grantForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const mid = f.grantMember.value;
      const amt = Number(f.grantAmount.value);
      const note = f.grantNote.value.trim() || 'Bonus-Coins';
      if (!mid || !amt) { alert('Bitte Mitglied und Betrag angeben.'); return; }
      if (isDemoMode()) {
        const m = DEMO_MEMBERS.find(x => x.id === mid);
        if (m) m.coins = (m.coins || 0) + amt;
        const u = Object.values(DEMO_USERS).find(u => u.data.id === mid);
        if (u) u.data.coins = (u.data.coins || 0) + amt;
        DEMO_TRANSACTIONS.unshift({ id:Date.now(), member_id:mid, amount:amt, type:'admin_grant', description:note, created_at:new Date().toISOString(), member:m ? {first_name:m.first_name,last_name:m.last_name,email:m.email} : {} });
        route('admin');
        return;
      }
      const { error } = await supa.rpc('admin_grant_coins', { p_member_id: mid, p_amount: amt, p_description: note });
      if (error) { alert('Fehler: '+error.message); return; }
      route('admin');
    });
  };

  return `
    <div class="prem-hero">
      <div class="prem-eyebrow">Verwaltung</div>
      <h1>Admin <em>Panel.</em></h1>
      <p class="prem-hero-lead">Coin-Anträge prüfen, Bonus vergeben, Challenges verwalten.</p>
    </div>
    <div class="prem-section">
      <div class="prem-stats">
        <div class="prem-stat"><div class="prem-stat-label">Mitglieder</div><div class="prem-stat-num">${fmtNum(members.length)}</div></div>
        <div class="prem-stat"><div class="prem-stat-label">Offene Anträge</div><div class="prem-stat-num">${fmtNum(pendingReqs.length)}</div></div>
        <div class="prem-stat"><div class="prem-stat-label">Coins im Umlauf</div><div class="prem-stat-num">${fmtNum(totalCoins)}</div></div>
        <div class="prem-stat"><div class="prem-stat-label">Aktive Challenges</div><div class="prem-stat-num">${fmtNum(anns.filter(a => a.is_active).length)}</div></div>
      </div>
    </div>
    <div class="prem-section">
      <div class="prem-section-head">
        <div class="prem-section-eyebrow">Challenges</div>
        <h2>Neue Challenge <em>anlegen.</em></h2>
      </div>
      <div class="prem-compose">
        <form id="annForm" class="prem-form">
          <label class="prem-label">Titel <input type="text" name="annTitle" class="prem-input" required></label>
          <label class="prem-label">Beschreibung <textarea name="annDesc" class="prem-input" required></textarea></label>
          <div class="prem-form-grid">
            <label class="prem-label">Hauptpreis <input type="text" name="annReward" class="prem-input" placeholder="z.B. 98 Zoll OLED"></label>
            <label class="prem-label">Deadline <input type="date" name="annDeadline" class="prem-input"></label>
          </div>
          <button type="submit" class="prem-btn prem-btn-orange">Challenge veröffentlichen</button>
        </form>
        <div class="prem-ann-list">
          ${anns.length ? anns.map(a => `
            <div class="prem-ann-row ${a.is_active ? '' : 'inactive'}">
              <div class="prem-ann-meta">
                <strong>${esc(a.title)}</strong>
                <small>${esc(a.description || '')}</small>
                ${a.reward ? `<span class="prem-ann-reward">Preis: ${esc(a.reward)}</span>` : ''}
                ${a.deadline ? `<small>Deadline ${new Date(a.deadline).toLocaleDateString('de-DE')}</small>` : ''}
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="prem-btn prem-btn-ghost prem-btn-sm" data-ann-toggle="${a.id}">${a.is_active ? 'Deaktivieren' : 'Aktivieren'}</button>
                <button class="prem-btn prem-btn-danger prem-btn-sm" data-ann-del="${a.id}">Löschen</button>
              </div>
            </div>
          `).join('') : '<p style="color:var(--warm-mid);font-size:14px;margin-top:10px;">Noch keine Challenges angelegt.</p>'}
        </div>
      </div>
    </div>
    <div class="prem-section">
      <div class="prem-section-head">
        <div class="prem-section-eyebrow">Prüfung</div>
        <h2>Coin-Anträge <em>prüfen.</em></h2>
      </div>
      <div class="prem-table-wrap">
        <table class="prem-table">
          <thead><tr><th>Datum</th><th>Mitglied</th><th>Auftrag</th><th>Notiz</th><th>Status</th><th>Coins</th><th></th></tr></thead>
          <tbody id="reqBody">
            ${reqs.length ? reqs.map(r => `
              <tr>
                <td>${new Date(r.created_at).toLocaleDateString('de-DE')}</td>
                <td>${esc((r.member && r.member.first_name) || '')} ${esc((r.member && r.member.last_name) || '')}<br><small style="color:var(--warm-mid);">${esc((r.member && r.member.email) || '')}</small></td>
                <td><strong>${esc(r.order_number)}</strong></td>
                <td>${esc(r.member_note || '—')}</td>
                <td><span class="prem-pill ${r.status}">${r.status === 'pending' ? 'Geprüft' : r.status === 'approved' ? 'Freigegeben' : 'Abgelehnt'}</span></td>
                <td>${r.status === 'pending'
                  ? `<input type="number" class="prem-input" style="width:80px;margin-top:0;padding:6px 0;border-bottom:1.5px solid var(--cream-line);" data-req-input="${r.id}" placeholder="MC" min="1">`
                  : (r.coins_awarded != null ? fmtNum(r.coins_awarded) : '—')}

                <td>${r.status === 'pending' ? `
                  <div style="display:flex;gap:6px;flex-wrap:wrap;">

            `).join('') : `<tr><td colspan="7" style="text-align:center;color:var(--warm-mid);padding:30px;">Keine Anträge.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
    <div class="prem-section">

/* ===================== ROUTING ===================== */
async function route(page) {
  window.scrollTo(0, 0);
  await loadMe();
  const memberOnly = ['members','shop','codes','coins','bikera'];
  const adminOnly = ['admin'];
  if (memberOnly.includes(page)) {
    if (!me) page = 'home';
    else if (me.status !== 'approved' && me.role !== 'admin') page = 'pending';
  }
  if (adminOnly.includes(page) && (!me || me.role !== 'admin')) page = !me ? 'home' : 'pending';
  if (me && (me.status === 'approved' || me.role === 'admin') && !me.agb_accepted_at && page !== 'agb' && page !== 'impressum' && page !== 'datenschutz' && page !== 'faq' && page !== 'home' && page !== 'register') {
    page = 'agb';
  }
  const showTopbar = me && (me.status === 'approved' || me.role === 'admin') && me.agb_accepted_at;
  if (showTopbar) { renderTopbar(page); renderFooter(); }
  else { document.getElementById('topbarSlot').innerHTML=''; document.getElementById('footerSlot').innerHTML=''; }
  const inAppPages = ['members','coins','shop','codes','bikera','admin','pending','confirmed','impressum','datenschutz','faq','agb'];
  if (inAppPages.includes(page) && (me || page==='impressum' || page==='datenschutz' || page==='faq')) document.body.classList.add('in-app');
  else document.body.classList.remove('in-app');
  const views = { home:viewHome, register:viewRegister, pending:viewPending, confirmed:viewConfirmed, agb:viewAgb, members:viewMembers, coins:viewCoins, shop:viewShop, codes:viewCodes, bikera:viewBikera, admin:viewAdmin, impressum:viewImpressum, datenschutz:viewDatenschutz, faq:viewFaq };
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px 24px;color:var(--warm-mid);"><div class="spinner"></div></div>';
  const html = await (views[page] || viewHome)();
  document.getElementById('app').innerHTML = html;
  if (window.__afterRender) { try { window.__afterRender(); } catch(e) { console.error(e); } window.__afterRender = null; }
}

/* ===================== BOOTSTRAP ===================== */
(async () => {
  window.addEventListener('hashchange', () => { const p = window.location.hash.replace('#','') || 'home'; route(p); });
  supa.auth.onAuthStateChange(async (event) => {
    if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') await loadMe();
    else if (event === 'SIGNED_OUT') { if (!isDemoMode()) me = null; }
  });
  await loadMe();
  const hash = window.location.hash.replace('#','');
  if (hash) route(hash);
  else if (me && (me.status === 'approved' || me.role === 'admin')) route(me.role === 'admin' ? 'admin' : 'members');
  else if (me) route('pending');
  else route('home');
})();
